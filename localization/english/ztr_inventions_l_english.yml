#NEW 1.6

euv_photolithography: "EUV Photolithography"
euv_photolithography_desc: "EUV (Extreme Ultraviolet) photolithography is a cutting-edge technology used in semiconductor manufacturing to create smaller and more complex microchips. By utilizing extremely short wavelengths of light (around 13.5 nanometers), EUV photolithography enables the production of intricate patterns on silicon wafers with higher precision and resolution compared to traditional photolithography methods. This advancement has been instrumental in driving the miniaturization of electronic devices based on Moore's Law."

stainless_steel: "Stainless Steel"
stainless_steel_desc: "Stainless steel is an alloy of iron, chromium, and other elements that is highly resistant to corrosion and staining. The addition of chromium forms a thin, protective oxide layer on the surface of the steel, preventing rust and enhancing its durability. So, stainless steel requires much less maintenance compared to regular steel."

agentic_ai: "Agentic AI"
agentic_ai_desc: "Agentic AI describes systems that can break complex goals into sub-tasks, call digital tools, evaluate intermediate results, and coordinate multi-step workflows with limited human supervision. Compared to generative AI, which mostly produces a single response or artifact, agentic systems are better suited for logistics, software engineering, administrative automation, and high-reliability industrial control. They are not yet equivalent to human general intelligence, but they represent the transition from content generation to semi-autonomous digital labor."

artificial_general_intelligence: "AGI"
artificial_general_intelligence_desc: "Artificial General Intelligence (AGI) refers to a type of AI that possesses the ability to understand, learn, and apply knowledge across a wide range of tasks at a level comparable to human intelligence. Unlike narrow AI, which is designed for specific tasks, AGI aims to exhibit general cognitive abilities, enabling it to reason, solve problems, and adapt to new situations autonomously. Starting from Victorian Coal & Steel, you have reached the pinnacle of technological advancement: congratulations!"

autonomous_road_vehicles: "Autonomous Road Vehicles"
autonomous_road_vehicles_desc: "Compared to balance than mining, air and agricultural vehicles, civil road vehicles are much harder to automate, due to the complexity of road traffic and the need to interact with human drivers. They require advanced sensors, machine learning algorithms, an IoT infrastructure and real-time decision-making capabilities to navigate safely and efficiently. Beyond these challenges, autonomous road vehicles have the potential to revolutionize transportation by reducing accidents, improving traffic flow, and increasing accessibility for individuals who are unable to drive."

virtual_reality: "Virtual Reality"
virtual_reality_desc: "Virtual reality (VR) are not just for gaming and entertainment, but also for training, education, and even therapy. VR technology creates immersive digital environments that can simulate buildings, activities, real-world experiences or entirely new worlds, allowing users to interact with and explore these environments in a way that feels natural and intuitive. Many questions remain about the long-term effects of VR on human cognition and social interaction, but its potential to transform human interaction and experience, is undeniable."

additive_manufacturing: "Additive Manufacturing"
additive_manufacturing_desc: "Additive manufacturing, commonly known as '3D printing', is a process of creating three-dimensional objects by adding material layer by layer based on a digital model. This technology allows for a cheaper and faster production of complex geometries and customized designs that would be difficult or impossible to achieve with traditional manufacturing methods. these 3D printers use materials such as plastics, metals, ceramics, and even biological materials to create a wide range of products, from prototypes and spare parts to medical implants and architectural models."

genomic_sequencing: "Genomic Sequencing"
genomic_sequencing_desc: "Despite the fact that the first DNA sequencing methods were developed in the 1970s, a full human genome sequencing was not completed until 2003, thanks to the Human Genome Project. Genomic sequencing is the process of determining the complete DNA sequence of an organism's genome, providing valuable insights into genetics, evolution, and disease. Today genomic sequencing is widely used in research, medicine, and personalized healthcare."

targeted_immunotherapy:"Targeted Immunotherapy"
targeted_immunotherapy_desc: "Targeted immunotherapy is a customized approach to treating long-term dynamic pathologies, such as cancer, using small molecule-drugs and monoclonal antibodies to manipulate the immune system. By targeting specific molecules involved in the immune response, this therapy can enhance the body's natural defenses against diseases while minimizing damage to healthy tissues. Targeted immunotherapy has shown promising results in treating various types of autoimmune disorders, dramatically improving patient outcomes in many cases. In this aspect, machine learning and AI play a crucial role in identifying potential targets and optimizing treatment strategies."

crispr_gene_editing: "CRISPR Gene Editing"
crispr_gene_editing_desc: "CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) gene editing is a revolutionary technology that allows scientists to precisely modify DNA sequences in living organisms. This technique utilizes a specialized enzyme called Cas9, which can be programmed to target specific DNA sequences, enabling the addition, deletion, or alteration of genetic material. CRISPR has the potential to treat genetic diseases, improve crop resilience, and advance our understanding of genetics, but it also raises ethical concerns regarding its non-clinical use in humans and the potential for unintended consequences. This is different from what is used to GMOs, which is a more traditional method of genetic modification that involves introducing foreign DNA into an organism's genome, often resulting in less precise and more unpredictable outcomes compared to CRISPR's targeted approach."

orbital_kinetic_weapons: "Orbital Kinetic Weapons"
orbital_kinetic_weapons_desc: "Orbital kinetic weapons, also known as 'rods from God', are theoretical space-based weapons that utilize kinetic energy to strike targets on Earth. These weapons would be launched into orbit and then de-orbited to deliver a high-velocity impact on a target, causing significant damage without the use of explosives. While the concept has been explored in science fiction and military discussions, the development and deployment of orbital kinetic weapons raise significant ethical, legal, and strategic concerns, particularly regarding the militarization of space and the potential for escalation in conflicts."

biorefining: "Biorefining"
biorefining_desc: "Integrated biorefineries convert crop sugars, cellulose pulp, and sorted organic waste into industrial feedstocks that can stand in for part of the fossil chain. Hydrotreated biofuels reduce the oil burden on refineries, advanced biopolymers give the plastics sector renewable inputs, and enzyme-based upcycling helps cities turn waste back into usable paper, plastics, and fertilizer. In practice, this technology ties together modern agriculture, recycling, and petrochemistry into a more circular industrial model."

high_voltage_transmission: "HV Transmission"
high_voltage_transmission_desc: "High voltage transmission systems use elevated voltages (typically 110 kV or higher) to transport electrical power over long distances with minimal energy loss. By stepping up voltage at power plants and stepping down at substations near consumption points, these systems enable the efficient distribution of electricity from remote generation sites to urban and industrial centers.\n\nBlackouts have never been less likely."
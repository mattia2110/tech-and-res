l_english:

# Game concepts
concept_demographic_stages: "Demographic Stages"
concept_demographic_stage: "Demographic Stage"
concept_demographic_stages_desc: "[Concept('concept_demographic_stages','$concept_demographic_stages$')] are a way to represent the evolution of a [Concept('concept_country','$concept_country$')]'s [Concept('concept_pop_growth','$concept_pop_growth$')] and quality of life. As a [Concept('concept_country','$concept_country$')] develops in [Concept('concept_literacy','$concept_literacy$')] and [Concept('concept_sol','$concept_sol$')], it progresses through the following stages:\n\n1.#v Pre-Industrial#!:\n[GetStaticModifier('demographic_stage_0').GetDesc]\n2.#v Early Industrial#!:\n[GetStaticModifier('demographic_stage_1').GetDesc]\n3.#v Mid Industrial#!:\n[GetStaticModifier('demographic_stage_2').GetDesc]\n4.#v Late Industrial#!:\n[GetStaticModifier('demographic_stage_3').GetDesc]\n5.#v Early Post-Industrial#!:\n[GetStaticModifier('demographic_stage_4').GetDesc]\n6.#v Mid Post-Industrial#!:\n[GetStaticModifier('demographic_stage_5').GetDesc]\n7.#v Late Post-Industrial#!:\n[GetStaticModifier('demographic_stage_6').GetDesc]\n8.#v Stagnant Stage#!:\n[GetStaticModifier('demographic_stage_7').GetDesc]\n9.#v Declining Stage#!:\n[GetStaticModifier('demographic_stage_8').GetDesc]"

concept_environment: "Environment"
concept_environmental: "Environmental"
concept_environment_desc: "[Concept('concept_environment','$concept_environment$')] is a concept that refers to the natural world and the impact of human activity on it. It encompasses the air, water, land, and ecosystems that support life on [Concept('concept_country','$concept_country$')] and Earth in general. The environment is crucial for the survival of all living beings, and its health is essential for the well-being of future generations. Environmentalist movements advocate for its protection, preservation and restoration, often in opposition to industrialization and economic development that can harm natural resources."

concept_colonial: "Colonial"
concept_decolonization: "Decolonization"
concept_decolonization_desc: "[Concept('concept_decolonization','$concept_decolonization$')] is a process that refers to the political and social movements aimed at ending [Concept('concept_colony','$concept_colonial$')] rule and establishing independence for colonized territories. It involves the dismantling of [Concept('concept_colony','$concept_colonial$')] structures, the assertion of self-determination, and the restoration of local governance. The process of [Concept('concept_decolonization','$concept_decolonization$')] can be complex and multifaceted, often involving negotiations, conflicts, and the redefinition of national identities."

concept_progressivism: "Progressivism"
concept_progressivism_desc: "[Concept('concept_progressivism','$concept_progressivism$')] is a political and social ideology that advocates for social reform, equality, and the advancement of human rights. It emphasizes the need for progressive change in society, often through government action, to address issues such as poverty, discrimination, and environmental degradation. Progressives seek to create a more just and equitable society by promoting policies that benefit the marginalized and disadvantaged, while also fostering innovation and technological advancement."

# NEW 1.5

concept_united_nations: "United Nations"
concept_united_nations_desc: "The [Concept('concept_united_nations','$concept_united_nations$')] is an international organization established to promote peace, security, and cooperation among its member states. It serves as a platform for dialogue and collaboration on global issues such as human rights, economic development, and environmental sustainability. The [Concept('concept_united_nations','$concept_united_nations$')] aims to prevent conflicts, provide humanitarian aid, and foster international law through its various agencies and programs. In gameplay, the [Concept('concept_united_nations','$concept_united_nations$')] can intervene to end aggressive and unjustifiable diplomatic plays."

concept_liberty_index: "Liberty Index"
concept_liberty_index_desc: "[Concept('concept_liberty_index','$concept_liberty_index$')] represents the level of personal and political freedoms enjoyed by the citizens of [Concept('concept_country','$concept_country$')]. An higher [Concept('concept_liberty_index','$concept_liberty_index$')] indicates a more open and [Concept('concept_democracy','$concept_democracy_adjective$')] society, while a lower index suggests a more [Concept('concept_autocracy','$concept_autocracy_adjective$')] regime, a dictatorship, or even a dystopia. The [Concept('concept_liberty_index','$concept_liberty_index$')] is influenced by most of the laws in place within the country."

concept_democracy: "Democracy"
concept_democracy_adjective: "Democratic"
concept_democracy_desc: "[Concept('concept_democracy','$concept_democracy$')] is a form of government in which power is vested in the people, either directly or through elected representatives. It emphasizes the principles of political equality, individual freedoms, and the rule of law. In a [Concept('concept_democracy','$concept_democracy$')], citizens have the right to participate in decision-making processes, express their opinions, and hold their leaders accountable. Democracies often feature regular elections, free speech, and protection of minority rights, fostering a society where diverse voices can be heard and respected."

concept_autocracy: "Autocracy"
concept_autocracy_adjective: "Autocratic"
concept_autocracy_desc: "[Concept('concept_autocracy','$concept_autocracy$')] is a form of government in which absolute power is concentrated in the hands of a single ruler or a small group. In an [Concept('concept_autocracy','$concept_autocracy$')], the ruling authority has unchecked control over political, social, and economic aspects of society, often without the consent or participation of the governed. [Concept('concept_autocracy','$concept_autocracy_adjective$')] regimes may suppress dissent, limit freedoms, and centralize decision-making, leading to a lack of accountability and potential abuses of power. This form of governance contrasts sharply with [Concept('concept_democracy','$concept_democracy_adjective$')] systems, where power is distributed among the people and their elected representatives."

concept_superpower: "Superpower"
concept_superpower_desc: "A [Concept('concept_superpower','$concept_superpower$')] is a nation that possesses unparalleled influence and capabilities on the global stage. Characterized by its dominant military strength, economic prowess, and political clout, a [Concept('concept_superpower','$concept_superpower$')] can shape international affairs and dictate the terms of global engagement. These nations often lead in technological innovation, military strength, cultural influence, and diplomatic initiatives, positioning themselves as key players in maintaining global stability and order. The status of a [Concept('concept_superpower','$concept_superpower$')] is not static; it requires continuous investment in defense, economy, and international relations to sustain its preeminence."

concept_equality_index: "Equality Index"
concept_equality_index_desc: "[Concept('concept_equality_index','$concept_equality_index$')] is a measure of the level of social and economic equality within [Concept('concept_country','$concept_country$')]. A higher [Concept('concept_equality_index','$concept_equality_index$')] indicates a more equitable distribution of wealth, opportunities, and resources among the population, while a lower index suggests significant disparities and social stratification. The [Concept('concept_equality_index','$concept_equality_index$')] is influenced by various factors, including government policies, social programs, and cultural attitudes towards equality and justice."

concept_ideology: "Ideology"
concept_ideology_adjective: "Ideological"
concept_ideology_desc: "[Concept('concept_ideology','$concept_ideology$')] refers to the value of [Concept('concept_liberty_index','$concept_liberty_index$')] and [Concept('concept_equality_index','$concept_equality_index$')] that shapes the political and social beliefs of [Concept('concept_country','$concept_country$')]. Different ideologies prioritize these values differently, leading to diverse governance styles and societal structures. Normally, a [Concept('concept_democracy','$concept_democracy_adjective$')] emphasizes a higher [Concept('concept_liberty_index','$concept_liberty_index$')], while a [Concept('concept_autocracy','$concept_autocracy_adjective$')] may prioritize control over individual freedoms. Similarly, ideologies that focus on social justice and redistribution of wealth tend to advocate for a higher [Concept('concept_equality_index','$concept_equality_index$')], whereas those favoring free-market principles may accept greater economic disparities."

concept_developed_country: "Developed Country"
concept_developed_country_short: "Developed"
concept_developed_countries: "Developed Countries"
concept_developed_country_desc: "A country is considered [Concept('concept_developed_country','$concept_developed_country_short$')] when it has reached a certain level of economic and social development. This includes factors such as GDP per capita, life expectancy, education levels, and industrialization. [Concept('concept_developed_country','$concept_developed_country_short$')] countries are typically characterized by advanced infrastructure, a diversified economy and a high standard of living and welfare for its citizens."

# UN law concepts
concept_un_subject_imf: "IMF"
concept_un_subject_imf_desc: "The IMF and World Bank are the financial arm of the modern international order, coordinating reconstruction, currency stability, and development lending."
concept_un_subject_wto: "WTO"
concept_un_subject_wto_desc: "The World Trade Organization is a rules-based institution for global trade, lowering barriers and standardizing commercial disputes."
concept_un_subject_icc: "International Criminal Court"
concept_un_subject_icc_desc: "The International Criminal Court is a standing judicial institution that can pressure states accused of atrocities, devastation, or predatory wars."
concept_un_subject_unesco: "UNESCO"
concept_un_subject_unesco_desc: "UNESCO is the #blue_value United Nations#! system's institution for education, science, and cultural collaboration across borders."

concept_un_voting_model_one_country_one_vote: "One Country, One Vote"
concept_un_voting_model_one_country_one_vote_desc: "Every #blue_value United Nations#! member state casts exactly one vote, regardless of size, wealth, population, or military power."
concept_un_voting_model_weighted_by_prestige: "Weighted by Prestige"
concept_un_voting_model_weighted_by_prestige_desc: "UN voting power is weighted by international prestige, giving larger influence to the most prestigious states."
concept_un_voting_model_security_council_only: "Security Council Only"
concept_un_voting_model_security_council_only_desc: "Only Permanent Members of the Security Council may vote on #blue_value United Nations#! proposals."
concept_un_voting_model_superpowers_only: "Superpowers Only"
concept_un_voting_model_superpowers_only_desc: "Only the two highest-ranked global powers decide the outcome of #blue_value United Nations#! proposals."

concept_un_veto_right_enabled: "Enabled"
concept_un_veto_right_enabled_desc: "Permanent Members of the Security Council retain the right to veto #blue_value United Nations#! proposals."
concept_un_veto_right_disabled: "Abolished"
concept_un_veto_right_disabled_desc: "Permanent Members of the Security Council no longer have veto power over #blue_value United Nations#! proposals."

concept_un_member_selection_by_prestige: "By Prestige"
concept_un_member_selection_by_prestige_desc: "Permanent Members of the Security Council are selected from the most prestigious countries in the world."
concept_un_member_selection_geographic_representation: "Geographic Representation"
concept_un_member_selection_geographic_representation_desc: "Permanent Members of the Security Council are selected to balance the major world regions."
concept_un_member_selection_by_military_power: "By Military Power"
concept_un_member_selection_by_military_power_desc: "Permanent Members of the Security Council are selected from the states with the strongest armed forces."
concept_un_member_selection_strongest_country: "Strongest Country"
concept_un_member_selection_strongest_country_desc: "Permanent membership is assigned to the strongest overall country, emphasizing raw international power."

concept_un_decolonization_encouraged: "Encourage Decolonization"
concept_un_decolonization_encouraged_desc: "The #blue_value United Nations#! actively pushes for the dismantling of colonial rule and sharpens international support for self-determination, pressuring colonizers on [GetLawType('law_colonial_resettlement').GetName], [GetLawType('law_colonial_exploitation').GetName], and [GetLawType('law_frontier_colonization').GetName] toward [GetLawType('law_no_colonial_affairs').GetName]."
concept_un_decolonization_conservative: "Colonization As Is"
concept_un_decolonization_conservative_desc: "The #blue_value United Nations#! condemns colonial governance and pressures members away from [GetLawType('law_colonial_resettlement').GetName], [GetLawType('law_colonial_exploitation').GetName] toward [GetLawType('law_no_colonial_affairs').GetName] with a conservative stance of colonies."
concept_un_decolonization_neutral: "No UN Statement"
concept_un_decolonization_neutral_desc: "The #blue_value United Nations#! does not maintain a common international stance on colonial governance."

concept_un_slavery_illegal: "Slavery Banned"
concept_un_slavery_illegal_desc: "The #blue_value United Nations#! declares slavery illegal and pressures members away from [GetLawType('law_colonial_slavery').GetName], [GetLawType('law_debt_slavery').GetName], [GetLawType('law_slave_trade').GetName], and [GetLawType('law_legacy_slavery').GetName] toward [GetLawType('law_slavery_banned').GetName]."
concept_un_slavery_neutral: "No UN Statement"
concept_un_slavery_neutral_desc: "The #blue_value United Nations#! does not maintain a common international stance on slavery."

concept_un_children_rights_negligible: "Negligible"
concept_un_children_rights_negligible_desc: "The #blue_value United Nations#! sets no common minimum standard for children's rights and leaves member states free to keep their current child-labor laws."
concept_un_children_rights_restricted_child_labor: "Restricted Child Labor"
concept_un_children_rights_restricted_child_labor_desc: "The #blue_value United Nations#! sets a minimum children's-rights standard that moves members away from [GetLawType('law_child_labor_allowed').GetName] and toward [GetLawType('law_restricted_child_labor').GetName]."
concept_un_children_rights_compulsory_study: "Child Labor Banned"
concept_un_children_rights_compulsory_study_desc: "The #blue_value United Nations#! endorses a stronger children-rights standard centered on schooling, pushing members toward [GetLawType('law_compulsory_primary_school').GetName]."

concept_un_women_rights_negligible: "Negligible"
concept_un_women_rights_negligible_desc: "The #blue_value United Nations#! sets no common minimum standard for women's rights and leaves member states free to keep restrictive laws."
concept_un_women_rights_gender_equality: "Gender Equality"
concept_un_women_rights_gender_equality_desc: "The #blue_value United Nations#! recognizes women's legal equality as the international standard and pressures members away from [GetLawType('law_no_womens_rights').GetName] and [GetLawType('law_women_own_property').GetName] toward [GetLawType('law_women_in_the_workplace').GetName]."

concept_un_institution_imf_not_established: "Not Established"
concept_un_institution_imf_not_established_desc: "The UN order has not yet established an IMF and World Bank framework."
concept_un_institution_imf_established: "Established"
concept_un_institution_imf_established_desc: "The IMF and World Bank are part of the UN-led order, coordinating reconstruction finance, currency stability, and long-term development lending."
concept_un_institution_wto_not_established: "Not Established"
concept_un_institution_wto_not_established_desc: "The UN order has not yet established a World Trade Organization."
concept_un_institution_wto_established: "Established"
concept_un_institution_wto_established_desc: "The World Trade Organization is part of the UN-led order, lowering trade barriers and improving market integration for UN members."
concept_un_institution_icc_not_established: "Not Established"
concept_un_institution_icc_not_established_desc: "The UN order has not yet established an International Criminal Court."
concept_un_institution_icc_established: "Established"
concept_un_institution_icc_established_desc: "The International Criminal Court is part of the UN-led order and can impose reputational and political pressure on severe offenders."
concept_un_institution_unesco_not_established: "Not Established"
concept_un_institution_unesco_not_established_desc: "The UN order has not yet established UNESCO."
concept_un_institution_unesco_established: "Established"
concept_un_institution_unesco_established_desc: "UNESCO is part of the UN-led order, promoting scientific exchange, education policy, and cultural cooperation."
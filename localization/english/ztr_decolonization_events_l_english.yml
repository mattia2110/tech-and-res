ztr_decolonization.100.t: "Winds of Decolonization" #UPDATE
ztr_decolonization.100.d: "Amid growing international pressure, the rise of nationalism and rigid colonial policies, our [concept_subject] [SCOPE.sCountry('subject_scope').GetName] is demanding more and more #i Independence#!. The global tide is shifting, and we must decide whether to adapt to the new order or risk conflict to preserve our [Concept('concept_decolonization','Colonial')] empire." #UPDATE
ztr_decolonization.100.a: "Grant them what they want, even #gold_value Independence#!. We have to adapt to the new world." #UPDATE
ztr_decolonization.100.b: "We must preserve our empire, even in case of a possible conflict." #UPDATE

ztr_decolonization.101.t: "UN Decolonization Demand"
ztr_decolonization.101.d: "The [Concept('concept_united_nations','$concept_united_nations$')] #blue_value General Assembly#!, acting under its [Concept('concept_un_decolonization_encouraged','$concept_un_decolonization_encouraged$')] resolution, has formally demanded that [ROOT.GetCountry.GetName] release [SCOPE.sCountry('un_demand_subject').GetName] from colonial rule. Our #n infamy#! has drawn the ire of the international community, and the world awaits our response."
ztr_decolonization.101.a: "Comply with the resolution and grant independence."
ztr_decolonization.101.b: "Defy the United Nations. We will not be dictated to."

#NEW 1.6

ztr_decolonization.1.t: "The Age of Decolonization"
ztr_decolonization.1.d: "The #v Old Colonial Order#!, long assumed to be the natural state of the world, is beginning to show deep fractures.\n\n#p Self-determination#! movements are gathering strength in [concept_subject] territories. Colonial administrators report growing unrest, and the costs of maintaining overseas empires, both moral and material, are mounting with each passing year.\n\nThe question is no longer whether the #i Colonial Age#! will end, but how swiftly and at what cost."
ztr_decolonization.1.f: "#italic The era of foreign domination is drawing to a close. The colonized peoples of the world will wait no longer.#!"
ztr_decolonization.1.a: "The winds of change are upon us."

 ### Decolonization Phase Events ###

 # Phase 1: Quiet Phase (0-25 pressure)

ztr_decolonization_phases.1.t: "The Educated Native"
ztr_decolonization_phases.1.d: "A [SCOPE.sCulture('native_culture_scope').GetName] intellectual, educated in our own universities and fluent in our own language, has published a treatise in [SCOPE.sState('decolonizing_state').GetName] demanding self-governance, citing the very principles of liberty we claim to uphold. The work circulates among the native elites, and its arguments are uncomfortably difficult to refute.\n\nThe local administration awaits instructions: engage with the ideas, or silence them before they reach a wider audience."
ztr_decolonization_phases.1.a: "Engage! Their arguments deserve an answer."
ztr_decolonization_phases.1.b: "Suppress the publication before it spreads."

ztr_decolonization_phases.2.t: "Missionaries and Conscience"
ztr_decolonization_phases.2.d: "#v Missionaries#! returning from [SCOPE.sCountry('missionary_subject').GetName] have published harrowing accounts of the conditions endured by the native population: forced labor, disease, and systematic neglect, laid bare for our public to read. Their letters, reprinted in church bulletins and metropolitan newspapers, have stirred a growing crisis of conscience.\n\nParliament cannot ignore the outcry. Abolitionist societies and humanitarian leagues demand an official response."
ztr_decolonization_phases.2.a: "Commission an official inquiry into colonial conditions."
ztr_decolonization_phases.2.b: "Dismiss the reports as missionary exaggeration."

ztr_decolonization_phases.3.t: "Songs of the Homeland"
ztr_decolonization_phases.3.d: "A cultural revival is stirring in [SCOPE.sState('songs_state').GetName]. Folk songs, traditional dances, and oral histories of [SCOPE.sCulture('native_culture_scope').GetName] [Concept('concept_culture','$concept_cultures$')] are performed with renewed fervor in market squares, at weddings, in late-night gatherings that fall silent when soldiers pass.\n\nWhat appears as mere nostalgia to the uninitiated is, to the colonial administration, the first language of resistance: a shared identity around which political demands may soon crystallize."
ztr_decolonization_phases.3.a: "Folklore is harmless: let them sing."
ztr_decolonization_phases.3.b: "Ban these subversive gatherings."

ztr_decolonization_phases.4.t: "Whispers in the Bazaar"
ztr_decolonization_phases.4.d: "Intelligence reports from [SCOPE.sCountry('whispers_subject').GetName] reveal that underground #v Nationalist Networks#! are quietly taking shape: clandestine meetings in marketplaces, coded messages passed through trade correspondence, and oaths of solidarity sworn in back rooms. For every organizer arrested, two more seem to take their place.\n\nThe movement is still fragile, but its roots grow deeper with each passing month. The colonial police recommend a decision: engage the moderates now, or tighten the surveillance net before it is too late."
ztr_decolonization_phases.4.a: "Open informal dialogue with the moderates to increase rights"
ztr_decolonization_phases.4.b: "Tighten the surveillance net. It is too late for dialogue."

 # Phase 2: Request Phase (25-50 pressure)

ztr_decolonization_phases.5.t: "A Formal Petition"
ztr_decolonization_phases.5.d: "A delegation of #v Colonial Elites#! from [SCOPE.sCountry('petition_subject').GetName] has presented a formal petition for self-governance, drafted in impeccable legal language and citing their loyalty during wartime, their economic contributions, and the democratic principles [ROOT.GetCountry.GetName] professes to champion.\n\nThis is no rabble's demand: it is a measured argument from men of standing, and it cannot simply be dismissed. To grant these demands would set a precedent; to refuse them risks radicalizing the very moderates we should want as partners."
ztr_decolonization_phases.5.a: "Promise gradual reforms. We must keep the moderates on our side."
ztr_decolonization_phases.5.b: "Reject the petition."

ztr_decolonization_phases.6.t: "Colonial Workers' Strike"
ztr_decolonization_phases.6.d: "The docks and rail yards of [SCOPE.sState('strike_state').GetName] have fallen silent. Stevedores, miners, railway men, have laid down their tools in a coordinated strike. Their demands go beyond wages: they want political representation and an end to the colonial labor regime.\n\nExport goods rot on the wharves. The colonial economy grinds toward a halt, and the strikers show no sign of yielding. The local garrison awaits orders."
ztr_decolonization_phases.6.a: "Negotiate before this spreads further."
ztr_decolonization_phases.6.b: "Send in the constabulary, break the strike."

ztr_decolonization_phases.7.t: "The International Stage"
ztr_decolonization_phases.7.d: "A delegation from [SCOPE.sCountry('intl_subject').GetName] has addressed the [Concept('concept_united_nations','$concept_united_nations$')] #blue_value General Assembly#!, presenting a damning account of colonial rule under [ROOT.GetCountry.GetName]. Delegates from across the world listen with undisguised sympathy, and the international press seizes upon the spectacle.\n\nRival nations smell opportunity. The comfortable fiction that colonial affairs are purely domestic matters is crumbling, and our reputation hangs in the balance."
ztr_decolonization_phases.7.a: "Damage control is essential."
ztr_decolonization_phases.7.b: "Denounce the delegation as foreign meddling."

ztr_decolonization_phases.8.t: "A Native Press"
ztr_decolonization_phases.8.d: "A network of native-language newspapers has emerged in [SCOPE.sState('press_state').GetName], printed on cheap stock and distributed hand to hand through tea houses, reading rooms, and village squares. Their editorials dissect colonial policy with surgical precision, speaking of nationhood, dignity, and independence.\n\nThe colonial censor cannot keep pace. Every attempt at suppression only multiplies the readership, and a new generation of native intellectuals, sharper, bolder, and far less willing to compromise, has found its platform."
ztr_decolonization_phases.8.a: "Tolerate the press as it may serve as a safety valve."
ztr_decolonization_phases.8.b: "Shut down the presses and arrest the editors."

 ### Phase 2: Religious Extremism ###
ztr_decolonization_phases.9.t: "Rising Extremism"
ztr_decolonization_phases.9.d: "A wave of religious fervor is sweeping through [SCOPE.sState('extremism_state').GetName]. Young men, hardened by years of foreign rule, have turned to radical preachers who frame the struggle for independence in starkly religious terms. Calls to expel the #v infidel occupiers#! grow louder with each passing month, and the movement threatens to overwhelm what remains of moderate political discourse.\n\nOur administrators warn that this is no longer merely a question of nationalism: it is becoming an #v Holy Cause#!."
ztr_decolonization_phases.9.a: "Fund counter-extremism programs before it escalates."
ztr_decolonization_phases.9.b: "We have more pressing concerns than angry sermons."

 ### Phase 2: Apartheid ###
ztr_decolonization_phases.10.t: "A Divided Society"
ztr_decolonization_phases.10.d: "In [SCOPE.sState('apartheid_state').GetName], the ethnic divisions that underpin our colonial administration have hardened into something uglier. Cities are carved into separate quarters. Public services, career opportunities, and even access to markets are determined by one's resemblance to a [SCOPE.sCulture('primary_culture_scope').GetName]. International observers have begun to take notice, and criticism of [ROOT.GetCountry.GetAdjective] governance is mounting.\n\nWe face a choice: begin the long and painful work of reform, or silence the critics and entrench the system further."
ztr_decolonization_phases.10.a: "Acknowledge the criticism, begin reforms before it is too late."
ztr_decolonization_phases.10.b: "Double down on segregation, order must be maintained."

 ### Phase 1: Colonial States Population Boom ###
ztr_decolonization_phases.11.t: "A Population Explosion"
ztr_decolonization_phases.11.d: "Modern medicine has reached [SCOPE.sState('boom_colonial_state').GetName], and the results are staggering. Infant mortality has plummeted as basic sanitation spreads through the population, yet birth rates remain high: the old patterns of large families persist even as the forces that once kept populations in check have been swept away.\n\nDemographers project a dramatic surge in population across our colonial territories, while the [ROOT.GetCountry.GetAdjective] heartland struggles to keep pace. The arithmetic of empire is shifting, more mouths to feed, more young people without prospects, and a growing imbalance that colonial administration was never designed to handle."
ztr_decolonization_phases.11.a: "Impose birth control measures in the colonies."
ztr_decolonization_phases.11.b: "Let nature take its course, we cannot play God."

 ### Phase 1: Subject Demographic Boom ###
ztr_decolonization_phases.12.t: "Subject Population Surge"
ztr_decolonization_phases.12.d: "[SCOPE.sCountry('boom_subject').GetName] is experiencing a dramatic population boom. Advances in public health have sharply reduced mortality rates, while birth rates remain stubbornly high. The population is growing faster than the local economy can absorb, straining food supplies, overwhelming colonial infrastructure, and producing a restless generation of young people with no prospects.\n\nSome in the colonial administration advocate for direct intervention to curb growth; others warn that such measures would provoke the very unrest we seek to prevent."
ztr_decolonization_phases.12.a: "Impose birth limits to control their numbers and prevent unrest."
ztr_decolonization_phases.12.b: "Let the population grow freely."

 ### Generic Colony Pop Events ###
 colony_pop.2.t: "Colonial Demographic Shift"
 colony_pop.2.d: "Across our colonial territories, a quiet revolution is underway. Early public health measures like clean water programs, basic vaccination campaigns, improved sanitation, have begun to reduce mortality rates among the native population. The effects are modest but unmistakable: more children survive infancy, more workers reach productive age, and the population is steadily climbing.\n\nThe colonial apparatus, designed to govern a smaller and more dispersed populace, may soon find itself overwhelmed by the very people it was built to control."
ztr_decolonization_phases_11_a_effect_tt: "Some [Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] population will grow slightly faster for #v 20 years#!"
ztr_decolonization_phases_11_b_effect_tt: "Some [Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] population will grow faster for #v 20 years#!."
ztr_decolonization_phases_12_a_effect_tt: "Some [concept_subject] population will grow slightly faster for #v 20 years#! and #gold_value Liberty Desire#! will increase by #n 10#!."
ztr_decolonization_phases_12_b_effect_tt: "Some [concept_subject] population will grow faster for #v 20 years#!."
colony_pop_2_a_effect_tt: "Some #v Colonial States#! population will grow faster for #v 5 years#!."
colony_pop_3_a_effect_tt: "Some [concept_subject] population will grow faster for #v 20 years#!."


# Phase-based descriptions for decolonization events
# Phase 2 - Low pressure (dismissive, bureaucratic)
ztr_decolonization.2.d_phase2: "Another petition from #v Tunisian#! notables has arrived at the colonial office, requesting greater local representation. The governor assures us it is a routine matter that warrants no special attention. Our position in the Maghreb remains unassailable."
ztr_decolonization.3.d_phase2: "#v Algerian#! civic leaders have submitted a memorandum requesting reforms to the colonial administration. The ministry considers it a minor bureaucratic formality; #v Algeria#! has long been an integral part of the empire. There is no reason to entertain these requests seriously."
ztr_decolonization.4.d_phase2: "A delegation from #v Morocco#! has petitioned for greater #gold_value self governance#! within the protectorate framework. Officials in the capital view it as posturing by local elites seeking influence. The sultan remains cooperative, and the protectorate is firmly in hand."
ztr_decolonization.5.d_phase2: "Local notables in #v Libya#! have forwarded a petition requesting administrative reforms and greater local participation. Colonial administrators regard the request as unremarkable, a minor nuisance from a quiet territory. The #v Libyan#! provinces remain well under control."
ztr_decolonization.6.d_phase2: "#v Egyptian#! nationalists have submitted yet another appeal for revisions to the current arrangement. The foreign office considers it routine posturing by Cairo politicians eager to play to their audience. Our strategic interests along the Suez remain perfectly secure."
ztr_decolonization.7.d_phase2: "A committee of #v Sudanese#! civic leaders has petitioned for a greater voice in the administration of their territory. Officials view it as an inconsequential gesture from a distant corner of the empire. The Anglo #v Egyptian#! arrangement endures without serious challenge."
ztr_decolonization.8.d_phase2: "Tribal leaders across #v Arabia#! have sent word requesting greater autonomy from our protectorate arrangements. The colonial office sees no urgency; the #v Arabian#! interior has always been loosely administered. Our coastal and strategic positions remain unthreatened."
ztr_decolonization.9.d_phase2: "The Sultan of #v Oman#! has raised questions about the scope of our treaty obligations and their effect on #v Omani#! #gold_value sovereignty#!. Our diplomats consider this a routine renegotiation tactic. Relations remain cordial and our influence along the coast is undisputed."
ztr_decolonization.10.d_phase2: "#v Yemeni#! leaders have sent a formal request questioning the terms of our protectorate over Aden and its hinterland. The colonial office treats this as a standard administrative inquiry. The port of Aden remains vital, and our position there is firm."
ztr_decolonization.11.d_phase2: "Sheikhs of the #v Trucial States#! have raised concerns about the extent of our advisory role in their affairs. Officials dismiss this as typical maneuvering for better treaty terms. The arrangement along the Gulf coast continues to serve our interests well."
ztr_decolonization.12.d_phase2: "#v Persian#! officials have renewed their protests over the terms of our concessions and spheres of influence. The foreign office considers this a periodic ritual of complaint. Our commercial and strategic interests in #v Persia#! remain well protected."
ztr_decolonization.13.d_phase2: "#v Burmese#! political associations have submitted a petition calling for greater legislative representation. Colonial officials regard this as familiar agitation from a vocal minority in Rangoon. The administration of #v Burma#! proceeds smoothly under existing arrangements."
ztr_decolonization.14.d_phase2: "#v Siamese#! diplomats have raised objections to the terms of our extraterritorial agreements and spheres of influence. The foreign office views this as routine posturing from Bangkok. Our advisory position and treaty rights in #v Siam#! are well established."
ztr_decolonization.15.d_phase2: "Local administrators in #v Laos#! have forwarded petitions from village leaders requesting greater autonomy from the colonial framework. The governor general's office considers this a minor regional matter. The protectorate over #v Laos#! remains a settled affair."
ztr_decolonization.16.d_phase2: "#v Vietnamese#! intellectuals have circulated a petition demanding reforms to the colonial education and governance system. Officials in Hanoi treat this as predictable agitation from a restless urban class. Indochina's administration remains on solid ground."
ztr_decolonization.17.d_phase2: "#v Cambodian#! notables have petitioned for a restoration of greater royal authority within the protectorate. The resident superior considers this a minor adjustment request that merits no significant concession. The protectorate arrangement over #v Cambodia#! is perfectly stable."
ztr_decolonization.18.d_phase2: "The #v Indian National Congress#! has submitted another round of constitutional demands to the Viceroy's office. The colonial administration regards these as the familiar chorus of nationalist rhetoric. #v India#! remains the jewel of the empire, and the #v Raj#! endures."
ztr_decolonization.19.d_phase2: "#v Korean#! cultural associations have petitioned for the restoration of educational and linguistic rights within the colonial system. The governor general's office views this as manageable dissent from a pacified territory. Our administration of #v Korea#! is firmly established."
ztr_decolonization.20.d_phase2: "#v Japanese#! diplomats have formally protested the terms of unequal treaties and foreign concessions on their soil. The foreign office treats this as a recurring formality from an ambitious but contained nation. Our extraterritorial rights in #v Japan#! remain in force."
ztr_decolonization.21.d_phase2: "#v Chinese#! officials have renewed demands for the revision of concession treaties and the return of leased territories. The foreign office views this as standard diplomatic posturing from a fractured nation. Our concessions and treaty ports remain secure and profitable."
ztr_decolonization.22.d_phase2: "#v Afghan#! tribal leaders have sent envoys protesting our influence over their border regions and foreign policy. The political officer considers this routine frontier bluster. #v Afghanistan#!'s buffer status and our control of the passes remain unchanged."
ztr_decolonization.23.d_phase2: "#v Malay#! political associations have petitioned for greater native participation in the administration of the Straits Settlements and Federated States. Officials in Singapore consider the request premature and unrealistic. Our position in #v Malaya#! is unchallenged."
ztr_decolonization.24.d_phase2: "#v Nepalese#! officials have raised questions about the scope of our resident's authority and the terms of our treaty relationship. The foreign office views this as a minor diplomatic adjustment request. #v Nepal#!'s status as a cooperative buffer state remains firmly in place."
ztr_decolonization.25.d_phase2: "#v Bhutanese#! officials have politely questioned certain provisions of our treaty arrangement regarding their external affairs. The political officer considers this a minor formality from a quiet and cooperative neighbor. Our relationship with #v Bhutan#! proceeds without concern."
ztr_decolonization.26.d_phase2: "#v Tibetan#! authorities have sent word objecting to our interference in their administrative and religious affairs. The political office views this as an inconsequential protest from a remote highland territory. Our strategic position regarding #v Tibet#! remains unaltered."
ztr_decolonization.27.d_phase2: "#v New Zealand#! politicians have raised questions about their constitutional relationship with the Crown and the scope of self governing autonomy. The Colonial Office views this as familiar Dominion posturing. The bonds of empire remain strong across the Pacific."
ztr_decolonization.28.d_phase2: "#v Iraqi#! nationalists have submitted a memorandum protesting the terms of our mandate and military presence. The high commissioner considers this routine discontent from Baghdad politicians. Our strategic interests in Mesopotamia and its oil remain well secured."
ztr_decolonization.29.d_phase2: "#v Syrian#! political leaders have petitioned the mandate authority for a timetable toward #gold_value self governance#!. The high commissioner views this as premature agitation from Damascus elites. The mandate over #v Syria#! continues to serve its intended purpose without disruption."
ztr_decolonization.30.d_phase2: "#v Lebanese#! politicians have submitted requests for greater autonomy from the mandate administration. Officials consider this typical maneuvering among Beirut's fractious political factions. The mandate arrangement over #v Lebanon#! remains orderly and functional."
ztr_decolonization.31.d_phase2: "#v Transjordanian#! leaders have raised questions about the long term status of the emirate under our mandate. The British Resident considers this a polite diplomatic inquiry requiring no immediate action. The emirate remains a stable and cooperative territory."
ztr_decolonization.32.d_phase2: "#v Arab#! and #v Jewish#! community leaders in #v Palestine#! have separately petitioned the mandate authority with competing demands. The high commissioner treats both as familiar grievances requiring careful bureaucratic management. The mandate administration continues its balancing act."
ztr_decolonization.33.d_phase2: "#v Kurdish#! tribal leaders have petitioned for recognition of their distinct administrative status within the mandate framework. Officials view this as a localized request from mountain communities seeking patronage. The broader mandate arrangement is unaffected."
ztr_decolonization.34.d_phase2: "#v Kenyan#! political associations have submitted a petition demanding land reform and greater representation in the legislative council. The colonial governor considers this manageable agitation from Nairobi's educated class. The colony's administration proceeds without disruption."
ztr_decolonization.35.d_phase2: "Local leaders in #v Namibia#! have petitioned for the redress of land grievances and greater political recognition. The territorial administration regards this as a minor nuisance from a sparsely populated mandate. Our authority over the territory is unquestioned."
ztr_decolonization.36.d_phase2: "#v Somali#! clan leaders have raised objections to the boundaries and administration of our protectorate. Colonial officials treat this as routine tribal complaint from a difficult frontier region. The protectorate serves its strategic purpose along the Horn of Africa."
ztr_decolonization.37.d_phase2: "#v Eritrean#! community leaders have petitioned for clarification of their territory's future status under our administration. Colonial officials view this as an unremarkable administrative inquiry. The territory remains a quiet outpost requiring no special attention."
ztr_decolonization.38.d_phase2: "Traditional leaders in #v Chad#! have forwarded concerns about the extent of colonial taxation and conscription in their territories. The colonial governor dismisses these as typical complaints from a vast and thinly administered region. #v Chad#! remains a quiet backwater."
ztr_decolonization.39.d_phase2: "Chiefs in #v Niger#! have raised concerns about the scope of colonial authority over their traditional lands and trade routes. The lieutenant governor considers this routine murmuring from the Sahel. The territory presents no administrative challenge of note."
ztr_decolonization.40.d_phase2: "#v Mauritanian#! emirs have questioned the terms of our administration over their territories and trading networks. Colonial officials view this as minor posturing from the desert fringe. The colony of #v Mauritania#! remains firmly under our quiet supervision."
ztr_decolonization.41.d_phase2: "#v Senegalese#! political figures, including members of the Four Communes, have petitioned for expanded political rights across the colony. The governor general considers this familiar urban politics from Dakar. Our West African administration remains thoroughly established."
ztr_decolonization.42.d_phase2: "#v Guinean#! community leaders have petitioned the colonial administration for greater economic freedom and local representation. Officials in Conakry treat this as a minor regional matter. The colony remains a productive and orderly part of our West African federation."
ztr_decolonization.43.d_phase2: "#v Ivorian#! planters and chiefs have raised objections to the terms of forced labor and trade monopolies in the colony. The colonial governor considers these complaints a routine part of administering a productive territory. The #v Ivory Coast#! remains a valuable economic asset."
ztr_decolonization.44.d_phase2: "#v Gold Coast#! intellectuals and chiefs have submitted a petition for constitutional reform and greater native representation. The governor considers this predictable agitation from Accra's educated elite. The colony remains one of the most prosperous and stable in West Africa."
ztr_decolonization.45.d_phase2: "Leaders in #v Togo#! have petitioned the mandate authority regarding the future status of their territory. The mandate commissioner views this as a routine inquiry requiring standard diplomatic response. The mandate over #v Togo#! continues to function as intended."
ztr_decolonization.46.d_phase2: "Traditional rulers in #v Benin#! have raised questions about the extent of colonial authority over their historical kingdoms. The colonial administration considers this a localized concern from a quiet stretch of the coast. The colony presents no serious administrative difficulty."
ztr_decolonization.47.d_phase2: "Chiefs in Burkina Faso have petitioned against the colonial labor recruitment policies affecting their communities. The lieutenant governor dismisses these concerns as typical resistance to modernization. The territory remains a stable labor reserve for the coastal colonies."
ztr_decolonization.48.d_phase2: "#v Nigerian#! political leaders from Lagos and the regional assemblies have submitted a memorandum calling for constitutional advancement. The governor general considers this routine political activity in a complex colony. Nigeria remains firmly administered through our indirect rule system."
ztr_decolonization.49.d_phase2: "#v Cameroonian#! representatives have petitioned the mandate authority about the pace of political development in the territory. The mandate commissioner regards this as a standard diplomatic exchange. The administration of #v Cameroon#! continues along established lines."
ztr_decolonization.50.d_phase2: "Local leaders in the #v Central African Republic#! have forwarded grievances about forced labor and taxation under colonial rule. The colonial governor views these as predictable complaints from a remote interior territory. The colony remains a quiet administrative district."
ztr_decolonization.51.d_phase2: "#v Gabonese#! leaders have petitioned for greater local participation in the administration of their resource rich territory. Colonial officials in Libreville treat this as unremarkable. #v Gabon#! remains a small and easily managed colony producing valuable timber and minerals."
ztr_decolonization.52.d_phase2: "Political associations in the #v Republic of the Congo#! have raised concerns about the terms of colonial concessions and native rights. The colonial governor considers these complaints manageable. Brazzaville remains a functioning administrative center for our equatorial territories."
ztr_decolonization.53.d_phase2: "#v Congolese#! évolués have submitted a petition requesting political rights and an end to discriminatory colonial practices. The administration dismisses this as premature ambition from a small educated class. The vast #v Congo#! territory remains firmly under our authority."
ztr_decolonization.54.d_phase2: "#v Ugandan#! kingdoms and political leaders have petitioned for a clearer path toward #gold_value self governance#! within the protectorate. The governor considers this familiar jockeying among Kampala's political class. The protectorate over #v Uganda#! remains orderly and well established."
ztr_decolonization.55.d_phase2: "#v Rwandan#! leaders have raised questions about the future of the mandate territory and their role within its administration. The mandate commissioner treats this as an unremarkable inquiry. The small highland territory continues to be governed through established structures."
ztr_decolonization.56.d_phase2: "#v Tanganyikan#! political associations have petitioned for greater representation in the territory's legislative council. The governor considers this a modest request from a cooperatively administered mandate. The territory presents no immediate concerns for the administration."
ztr_decolonization.57.d_phase2: "#v Angolan#! civic leaders have petitioned Lisbon for reforms to the colonial labor code and greater native rights. The colonial ministry considers these requests a minor bureaucratic matter. #v Angola#! remains a cornerstone of our overseas empire, securely administered."
ztr_decolonization.58.d_phase2: "Northern Rhodesian leaders have petitioned the colonial office about land rights and the future of the protectorate. Officials in Lusaka view this as standard political agitation from the copperbelt region. The protectorate over #v Zambia#! remains a profitable and stable holding."
ztr_decolonization.59.d_phase2: "#v Mozambican#! community leaders have submitted grievances to the colonial administration regarding forced labor and pass laws. Officials in Lourenço Marques dismiss these as routine complaints. #v Mozambique#! remains a firmly held territory of our overseas empire."
ztr_decolonization.60.d_phase2: "#v Malawian#! chiefs have petitioned the colonial governor for land reform and greater native representation. The administration considers this typical agitation from the educated class around Blantyre. The protectorate over Nyasaland remains a settled affair."
ztr_decolonization.61.d_phase2: "The #v Swazi#! monarchy has raised diplomatic questions about the long term status of #v Eswatini#! under our protectorate. The high commissioner treats this as a routine matter of treaty interpretation. The small protectorate remains stable and firmly within our sphere."
ztr_decolonization.62.d_phase2: "#v Basotho#! chiefs have petitioned the high commissioner regarding land pressures and the future of their protectorate status. Officials view this as a localized concern from a small enclave territory. #v Lesotho#! remains a quiet and cooperative protectorate."
ztr_decolonization.63.d_phase2: "#v Malian#! community leaders have raised concerns about colonial taxation and the administration of their traditional territories. The lieutenant governor considers these routine complaints from the interior. The vast #v Sudanese#! territory remains under our unchallenged authority."
ztr_decolonization.64.d_phase2: "#v Tswana#! chiefs in #v Botswana#! have petitioned the high commissioner about land encroachment and the scope of the protectorate's future. Officials view this as a standard administrative inquiry from a quiet territory. The #v Bechuanaland Protectorate#! continues to require minimal attention."
ztr_decolonization.65.d_phase2: "African political organizations in #v Zimbabwe#! have petitioned the colonial government for land reform and native voting rights. The governor considers this familiar agitation from a vocal minority. #v Southern Rhodesia#! remains one of our most developed and settled colonies."
ztr_decolonization.66.d_phase2: "#v Malagasy#! political associations have submitted a petition calling for constitutional reform and greater native participation. The governor general considers this predictable activity from Antananarivo's political circles. #v Madagascar#! remains a firmly administered overseas territory."
ztr_decolonization.67.d_phase2: "#v Ethiopian#! officials have protested the terms of our territorial concessions and interference in their sovereign affairs. The foreign office treats this as typical posturing from Addis Ababa. Our position and treaty rights regarding #v Ethiopia#! remain well established."
 # Phase 3 - Medium pressure (concerned, winds of change)
ztr_decolonization.2.d_phase3: "The #gold_value independence#! movement in #v Tunisia#! is gaining real momentum. Organized strikes and demonstrations in Tunis have forced the administration to acknowledge that the status quo may not hold. The winds of change are clearly blowing across the Maghreb."
ztr_decolonization.3.d_phase3: "#v Algeria#! is growing increasingly restive, with nationalist organizations consolidating support across the territory. The colonial administration can no longer dismiss the movement as the work of a few agitators. Something fundamental is shifting in the relationship between #v Algeria#! and the metropole."
ztr_decolonization.4.d_phase3: "The #v Moroccan#! #gold_value independence#! movement has grown beyond the control of co opted local elites. Mass protests in Casablanca and Fez signal that popular sentiment has turned decisively against the protectorate. The sultan's cooperation can no longer be taken for granted."
ztr_decolonization.5.d_phase3: "Resistance in #v Libya#! has escalated beyond scattered tribal dissent into an organized political movement. The colonial administration faces growing difficulty maintaining order in Tripoli and Benghazi. Our grip on this North African territory is loosening faster than anticipated."
ztr_decolonization.6.d_phase3: "#v Egyptian#! nationalism has intensified to the point where the existing arrangement is becoming untenable. Mass demonstrations in Cairo and Alexandria grow larger with each passing month. Our strategic position along the Suez is increasingly compromised by popular hostility."
ztr_decolonization.7.d_phase3: "#v Sudanese#! political parties have unified around the demand for #gold_value independence#!, and support is spreading rapidly beyond Khartoum. The administration acknowledges that the old condominium arrangement is under serious strain. The question is no longer whether change will come, but when."
ztr_decolonization.8.d_phase3: "#v Arabian#! nationalists have found common cause across tribal lines, and anti colonial sentiment is spreading through the peninsula. Our protectorate arrangements are being openly challenged by local rulers emboldened by regional shifts. The old order in #v Arabia#! is clearly eroding."
ztr_decolonization.9.d_phase3: "The Sultan of #v Oman#! has begun asserting #gold_value sovereignty#! in ways that directly challenge our treaty privileges. Popular sentiment in Muscat increasingly supports a complete break from foreign influence. Our longstanding dominance over #v Omani#! affairs is slipping."
ztr_decolonization.10.d_phase3: "#v Yemeni#! resistance to our presence around Aden has escalated from petitions to organized political agitation and sporadic violence. The hinterland tribes grow bolder in their defiance of protectorate authority. Maintaining our position in southern #v Arabia#! is becoming costly and contentious."
ztr_decolonization.11.d_phase3: "The #v Trucial#! sheikhs are asserting greater #gold_value independence#! from our advisory framework, emboldened by rising oil wealth and regional nationalism. Our traditional dominance over Gulf affairs faces a new and confident challenge. The old treaty system is showing its age."
ztr_decolonization.12.d_phase3: "#v Persian#! nationalism has reached a fever pitch, with popular movements demanding the nationalization of foreign concessions. The government in Tehran grows ever more assertive against our influence. Our once commanding position in #v Persia#! is being eroded by forces we can no longer easily contain."
ztr_decolonization.13.d_phase3: "The #v Burmese#! #gold_value independence#! movement has grown into a formidable political force with broad popular support. Strikes and civil disobedience campaigns are paralyzing the colonial administration in Rangoon. It is becoming clear that #v Burma#! cannot be governed on the old terms much longer."
ztr_decolonization.14.d_phase3: "#v Siamese#! nationalists have successfully mobilized public opinion against the remaining foreign treaty privileges. The government in Bangkok is under enormous pressure to reclaim full #gold_value sovereignty#!. Our extraterritorial position in #v Siam#! is becoming politically impossible to maintain."
ztr_decolonization.15.d_phase3: "Political awareness in #v Laos#! has grown dramatically, with #gold_value independence#! movements gaining traction among both elites and rural communities. The colonial framework that seemed so natural a decade ago now feels imposed and fragile. The protectorate faces a genuine crisis of legitimacy."
ztr_decolonization.16.d_phase3: "#v Vietnamese#! resistance has intensified into a well organized #gold_value independence#! movement with deep roots across the country. The colonial administration in Indochina acknowledges privately that the old methods of control are failing. The question of #v Vietnamese#! #gold_value self determination#! can no longer be deferred."
ztr_decolonization.17.d_phase3: "#v Cambodian#! nationalism has found its voice, with a new generation demanding genuine #gold_value independence#! beyond the protectorate framework. The palace and the people are increasingly aligned against continued foreign control. Our position in #v Cambodia#! rests on increasingly shaky foundations."
ztr_decolonization.18.d_phase3: "The #gold_value independence#! movement in #v India#! has reached a scale that no amount of reform can contain. Millions participate in civil disobedience, and the administrative machinery of the #v Raj#! strains under the weight of resistance. The subcontinent stands at the threshold of an irreversible transformation."
ztr_decolonization.19.d_phase3: "#v Korean#! resistance to colonial rule has evolved from cultural preservation into an organized mass movement for national liberation. Underground networks and international advocacy have made the #v Korean#! question impossible to ignore. The colonial administration faces mounting difficulties in maintaining order."
ztr_decolonization.20.d_phase3: "#v Japan#! has successfully leveraged international opinion to challenge the unequal treaty system, and domestic pressure for full #gold_value sovereignty#! is overwhelming. Foreign concessions and extraterritorial privileges are becoming untenable in the face of #v Japan#!'s rising power. The old order in East Asia is shifting."
ztr_decolonization.21.d_phase3: "#v Chinese#! nationalism has coalesced into a powerful movement demanding the abolition of all foreign concessions and treaty ports. The government, whatever its internal divisions, speaks with one voice on recovering full #gold_value sovereignty#!. Our position in #v China#! is rapidly becoming unsustainable."
ztr_decolonization.22.d_phase3: "#v Afghan#! resistance to foreign influence has hardened into a national movement that unites rival tribal factions. The passes and border regions grow increasingly dangerous for our forces and agents. Our ability to project influence into #v Afghanistan#! is diminishing with each passing season."
ztr_decolonization.23.d_phase3: "#v Malayan#! nationalism has gained serious momentum, with political parties demanding #gold_value independence#! and an end to colonial economic exploitation. Strikes in the tin mines and rubber plantations have disrupted the colonial economy. The comfortable arrangement in #v Malaya#! is under genuine threat."
ztr_decolonization.24.d_phase3: "#v Nepal#! has grown increasingly assertive in demanding the revision of treaty terms that limit its #gold_value sovereignty#!. A new generation of Nepali leaders views the old arrangement as a relic of imperialism. Our influence in Kathmandu is waning as nationalist sentiment rises."
ztr_decolonization.25.d_phase3: "#v Bhutan#!'s leadership has begun seeking alternative diplomatic relationships that would reduce our exclusive influence. The once docile protectorate is quietly but firmly asserting its #gold_value independence#!. Our privileged position in #v Bhutanese#! affairs faces an unexpected challenge."
ztr_decolonization.26.d_phase3: "#v Tibetan#! authorities have intensified their resistance to foreign interference, with growing support from the monastic establishment and populace. The highland territory is becoming increasingly difficult to influence or control from outside. The strategic calculus in Central Asia is shifting against us."
ztr_decolonization.27.d_phase3: "#v New Zealand#!'s political class is pushing for a more independent foreign policy and a constitutional relationship that reflects true #gold_value sovereignty#!. The old Dominion loyalty is giving way to a distinct national identity. The ties that bind this Pacific nation to the empire are loosening noticeably."
ztr_decolonization.28.d_phase3: "#v Iraqi#! nationalism has exploded into a broad popular movement demanding the end of foreign military presence and mandate authority. Riots in Baghdad and Basra have shaken the administration to its core. Our strategic position in Mesopotamia is under serious and sustained threat."
ztr_decolonization.29.d_phase3: "#v Syrian#! resistance to the mandate has grown from elite politics into a genuine mass movement. General strikes and demonstrations paralyze Damascus with alarming regularity. The mandate administration privately acknowledges that the current situation cannot continue indefinitely."
ztr_decolonization.30.d_phase3: "#v Lebanese#! political factions have found unprecedented unity in demanding the end of the mandate. The streets of Beirut witness regular demonstrations that the gendarmerie struggles to contain. Our administration in #v Lebanon#! faces a crisis of legitimacy that reforms alone cannot resolve."
ztr_decolonization.31.d_phase3: "#v Transjordanian#! nationalism has matured into a serious political force demanding full #gold_value sovereignty#! and the departure of foreign advisors. The emir faces enormous pressure from his own people to assert #gold_value independence#!. Our presence in the territory is increasingly resented."
ztr_decolonization.32.d_phase3: "The situation in #v Palestine#! has deteriorated as both #v Arab#! and #v Jewish#! communities grow more militant in their demands. The mandate authority finds itself caught between irreconcilable forces, each growing more desperate. Governing #v Palestine#! has become an exercise in managing escalating crises."
ztr_decolonization.33.d_phase3: "#v Kurdish#! nationalism has evolved from tribal resistance into an organized political movement demanding autonomy or #gold_value independence#!. Armed bands control significant stretches of the mountainous interior. The mandate's authority over #v Kurdish#! territories exists increasingly on paper alone."
ztr_decolonization.34.d_phase3: "#v Kenyan#! political organizations have mobilized massive support for land reform and #gold_value independence#!. The Mau Mau uprising and broader resistance movement have shaken the colonial establishment in Nairobi. The settler colony model in #v Kenya#! is being fundamentally challenged."
ztr_decolonization.35.d_phase3: "#v Namibian#! resistance to the mandate administration has grown organized and vocal, with leaders demanding #gold_value self determination#!. International pressure over the territory's status compounds the difficulties on the ground. Our authority over this vast territory is being questioned from every direction."
ztr_decolonization.36.d_phase3: "#v Somali#! nationalism has emerged as a unifying force across clan lines, with movements demanding #gold_value independence#! and territorial unity. Our protectorate is increasingly seen as an obstacle to #v Somali#! national aspirations. Maintaining order along the Horn of Africa grows more difficult by the month."
ztr_decolonization.37.d_phase3: "#v Eritrean#! political movements have coalesced around the demand for #gold_value self determination#!, rejecting continued foreign administration. The territory's strategic value must now be weighed against the growing cost of holding it. The question of #v Eritrea#!'s future can no longer be postponed."
ztr_decolonization.38.d_phase3: "Political consciousness in #v Chad#! has grown rapidly, with #gold_value independence#! movements gaining followers across the territory's diverse communities. The colonial administration faces resistance it once thought impossible in this remote region. The cost of maintaining our presence grows while its justification fades."
ztr_decolonization.39.d_phase3: "#v Niger#!'s #gold_value independence#! movement has gained unexpected strength, with leaders rallying support across ethnic and regional lines. Colonial authority in the Sahel is being openly challenged for the first time. The administration cannot ignore the shifting political landscape."
ztr_decolonization.40.d_phase3: "#v Mauritanian#! nationalists have unified the territory's diverse communities behind the demand for #gold_value independence#!. The old system of governing through cooperative emirs is breaking down as popular politics take hold. Our position in this desert territory is no longer assured."
ztr_decolonization.41.d_phase3: "#v Senegal#!'s #gold_value independence#! movement has grown beyond the old Four Communes politics into a territory wide demand for #gold_value sovereignty#!. The colonial federation's nerve center in Dakar pulses with anti colonial sentiment. Our West African edifice is cracking at its very foundation."
ztr_decolonization.42.d_phase3: "#v Guinea#!'s #gold_value independence#! movement has become the most militant in West Africa, with mass strikes and demonstrations shaking Conakry. The colonial administration faces a population that has decisively rejected continued foreign rule. The situation demands a fundamental reassessment."
ztr_decolonization.43.d_phase3: "The #gold_value independence#! movement in the #v Ivory Coast#! has grown from planter grievances into a broad popular demand for #gold_value sovereignty#!. The colonial economy that once seemed to justify our presence is now fueling the resistance against it. The territory's future within the empire is uncertain."
ztr_decolonization.44.d_phase3: "#v Ghana#!'s #gold_value independence#! movement has become the most advanced in sub Saharan Africa, with organized parties demanding immediate #gold_value self governance#!. The #v Gold Coast#!'s educated elite and mass base have created an unstoppable political force. Colonial officials privately concede that #gold_value independence#! is inevitable."
ztr_decolonization.45.d_phase3: "#v Togolese#! nationalists have successfully linked their cause to the broader question of mandate territories and #gold_value self determination#!. International scrutiny adds to the pressure on the administering authority. The mandate over #v Togo#! faces a crisis of justification."
ztr_decolonization.46.d_phase3: "Political movements in #v Benin#! have mobilized broad support for #gold_value independence#!, drawing on resentment of colonial exploitation. The territory's historical kingdoms provide a powerful narrative for national #gold_value self determination#!. Our administration faces challenges it can no longer manage through routine measures."
ztr_decolonization.47.d_phase3: "Burkina Faso's political awakening has caught the colonial administration off guard, with movements demanding an end to forced labor and foreign rule. What was once a docile labor reserve has become a center of organized resistance. The territory's future under colonial rule is in serious doubt."
ztr_decolonization.48.d_phase3: "#v Nigerian#! nationalism has grown into a powerful force that transcends the colony's regional and ethnic divisions. Political parties in Lagos, Ibadan, and Enugu coordinate an increasingly unified push for #gold_value independence#!. The most populous territory in our African empire is slipping from our grasp."
ztr_decolonization.49.d_phase3: "#v Cameroonian#! nationalism has intensified, with movements demanding reunification and full #gold_value independence#! from mandate control. Demonstrations in Douala and Yaoundé grow larger and more defiant with each passing month. The mandate arrangement is under critical pressure."
ztr_decolonization.50.d_phase3: "Political movements in the #v Central African Republic#! have gained surprising strength, challenging colonial authority across the territory. The isolation that once insulated this region from anti colonial sentiment has broken down. The administration faces a population determined to govern itself."
ztr_decolonization.51.d_phase3: "#v Gabonese#! political leaders have mobilized support for #gold_value independence#!, leveraging the territory's resource wealth as proof of self sufficiency. The small colony's educated elite is demanding a seat at the table of nations. Our position in equatorial Africa faces a growing legitimacy crisis."
ztr_decolonization.52.d_phase3: "The #gold_value independence#! movement in the #v Republic of the Congo#! has gained momentum, with Brazzaville becoming a hotbed of anti colonial organizing. Workers and intellectuals have joined forces in demanding an end to foreign rule. The colonial administration's authority is visibly eroding."
ztr_decolonization.53.d_phase3: "The #v Congo#! is experiencing a political awakening that threatens to overwhelm the colonial administration. #gold_value Independence#! movements have sprung up across the vast territory, and the demand for immediate #gold_value self governance#! grows louder daily. The scale of the challenge is unlike anything the administration has faced."
ztr_decolonization.54.d_phase3: "#v Uganda#!'s political movements have moved beyond kingdom rivalries to present a united front demanding #gold_value independence#!. The protectorate administration faces coordinated resistance from Buganda to the northern territories. The framework of indirect rule that once served us so well is now working against us."
ztr_decolonization.55.d_phase3: "#v Rwanda#!'s political landscape is shifting rapidly as #gold_value independence#! movements challenge both the colonial administration and traditional power structures. The territory's complex social dynamics add volatility to an already tense situation. Our mandate authority is being fundamentally questioned."
ztr_decolonization.56.d_phase3: "#v Tanzania#!'s #gold_value independence#! movement has emerged as one of the best organized in East Africa, with a charismatic leadership rallying broad support. The mandate territory's population is overwhelmingly united in demanding #gold_value self governance#!. The colonial administration concedes privately that the trajectory is clear."
ztr_decolonization.57.d_phase3: "#v Angola#!'s #gold_value independence#! movement has grown dramatically, fueled by decades of resentment over forced labor and economic exploitation. Armed resistance groups are forming in the countryside and abroad. Lisbon's insistence on holding the territory faces an increasingly violent challenge."
ztr_decolonization.58.d_phase3: "#v Zambia#!'s #gold_value independence#! movement has gained enormous momentum, driven by copper miners and urban workers demanding political rights. The colonial administration faces strikes and civil disobedience campaigns that paralyze the economy. The protectorate's days appear numbered."
ztr_decolonization.59.d_phase3: "#v Mozambican#! resistance to colonial rule has evolved from scattered rural grievances into an organized liberation movement. Armed groups operate with growing effectiveness along the northern borders. Lisbon's control over this vast coastal territory is being challenged in ways it cannot easily counter."
ztr_decolonization.60.d_phase3: "#v Malawi#!'s #gold_value independence#! movement has unified the territory's diverse communities behind the demand for #gold_value self governance#!. The colonial administration faces civil disobedience and political organizing on a scale it cannot manage. The protectorate system in Nyasaland has lost its legitimacy."
ztr_decolonization.61.d_phase3: "The #v Swazi#! monarchy and people have grown increasingly assertive in demanding full #gold_value sovereignty#! and an end to protectorate status. Regional #gold_value independence#! movements inspire confidence that the time for change has arrived. Our influence over the small kingdom is fading despite its geographic vulnerability."
ztr_decolonization.62.d_phase3: "#v Lesotho#!'s leaders have intensified their campaign for #gold_value independence#!, emboldened by the wave of decolonization sweeping the continent. The mountain kingdom's people are united in their desire for #gold_value self governance#!. Our protectorate authority faces a population that no longer accepts foreign oversight."
ztr_decolonization.63.d_phase3: "#v Mali#!'s #gold_value independence#! movement has drawn strength from the territory's rich precolonial history and a growing sense of national identity. Political organizations in Bamako coordinate an increasingly effective campaign for #gold_value sovereignty#!. The colonial administration can no longer contain the rising tide."
ztr_decolonization.64.d_phase3: "#v Botswana#!'s leaders have launched a sustained campaign for #gold_value independence#!, rejecting the protectorate's limitations on their #gold_value sovereignty#!. The territory's educated class has built international support for #gold_value self determination#!. Our position as protector is being recast as that of occupier."
ztr_decolonization.65.d_phase3: "#v Zimbabwe#!'s African majority has organized a powerful movement demanding political rights and an end to settler minority rule. The colony faces escalating unrest that the security forces struggle to contain. The old order in #v Southern Rhodesia#! is being shaken to its foundations."
ztr_decolonization.66.d_phase3: "#v Madagascar#!'s #gold_value independence#! movement has erupted into widespread popular resistance against colonial rule. The 1947 uprising may have been suppressed, but the underlying demand for #gold_value sovereignty#! has only grown stronger. The administration faces a population that will no longer accept the colonial arrangement."
ztr_decolonization.67.d_phase3: "#v Ethiopia#!'s resistance to foreign interference has hardened into an unyielding national movement backed by a proud military tradition. International opinion increasingly supports #v Ethiopian#! #gold_value sovereignty#! and condemns our position. Our presence and influence in the Horn of Africa face a determined and capable adversary."
 # Phase 4 - High pressure/crisis (urgent, fearful, empire crumbling)
ztr_decolonization.2.d_phase4: "#v Tunisia#! is on the verge of open revolt. Armed resistance cells operate across the country, and the colonial administration has lost effective control outside the major cities. We face a stark choice: concede now or face a bloody and unwinnable war."
ztr_decolonization.3.d_phase4: "#v Algeria#! has erupted into full scale insurgency. The #v National Liberation Front#! wages a relentless campaign of guerrilla warfare that stretches our forces to the breaking point. The cost of holding #v Algeria#! threatens to tear the metropole itself apart."
ztr_decolonization.4.d_phase4: "#v Morocco#! is in open revolt against the protectorate. The exiled sultan has become a rallying symbol for a population that will settle for nothing less than complete #gold_value independence#!. Our military position is crumbling, and every day of delay deepens the crisis."
ztr_decolonization.5.d_phase4: "#v Libya#! has become ungovernable. Armed resistance fighters control vast stretches of the countryside, and our garrison forces face constant attack. The colonial project in #v Libya#! has failed, and continued resistance will only add to the already staggering human cost."
ztr_decolonization.6.d_phase4: "#v Egypt#! stands at the brink of seizing full #gold_value sovereignty#! by force if necessary. The military and the people are aligned in their determination to expel foreign influence entirely. Our position along the Suez hangs by a thread, and any miscalculation could trigger an international crisis."
ztr_decolonization.7.d_phase4: "#v Sudan#! is in crisis as rival factions compete to fill the vacuum left by the collapsing condominium administration. Armed movements control entire provinces, and the capital itself is gripped by unrest. We must act decisively or risk a catastrophic and disorderly collapse."
ztr_decolonization.8.d_phase4: "#v Arabia#! has slipped entirely beyond our control. The old protectorate system has been swept away by a tide of nationalism and oil fueled confidence. Our remaining positions face armed hostility from populations that view us as relics of a bygone age."
ztr_decolonization.9.d_phase4: "#v Oman#!'s Sultan has effectively repudiated our treaty relationship, backed by a population in arms. Our remaining influence in Muscat exists on paper only, and any attempt to enforce it would require a military intervention we cannot justify. The game is up."
ztr_decolonization.10.d_phase4: "#v Yemen#! has become a warzone. Armed tribesmen lay siege to our positions around Aden, and the garrison faces daily attacks from an increasingly well armed resistance. Holding this corner of #v Arabia#! is costing lives and treasure we can no longer afford to spend."
ztr_decolonization.11.d_phase4: "The #v Trucial States#! have turned hostile, with rulers demanding the immediate termination of all treaty obligations. Oil wealth has given them the confidence and resources to back their demands with action. Our entire position along the Gulf is collapsing."
ztr_decolonization.12.d_phase4: "#v Persia#! has nationalized our concessions and our diplomatic protests fall on deaf ears. The streets of Tehran are filled with crowds demanding the complete expulsion of foreign influence. Our once dominant position in #v Persia#! has been utterly destroyed."
ztr_decolonization.13.d_phase4: "#v Burma#! is in the grip of armed insurrection across multiple fronts. The colonial administration controls only isolated urban centers, and the countryside belongs to the resistance. Our hold on #v Burma#! has effectively ended, and we must face reality."
ztr_decolonization.14.d_phase4: "#v Siam#!'s government has unilaterally abrogated the remaining unequal treaties, and popular fury makes any attempt at enforcement suicidal. The international community offers us no support. Our position in #v Siam#! has been swept away by an irresistible tide of #gold_value sovereignty#!."
ztr_decolonization.15.d_phase4: "#v Laos#! is in open rebellion against colonial authority. Resistance forces control the countryside, and our troops face ambushes on every road. The protectorate has become a bleeding wound that drains our strength with no prospect of recovery."
ztr_decolonization.16.d_phase4: "#v Vietnam#! is engulfed in a full scale war of national liberation that we are losing. The resistance controls vast swathes of the country, and our military operations achieve nothing permanent. The cost in blood and treasure mounts daily with no end in sight."
ztr_decolonization.17.d_phase4: "#v Cambodia#!'s population has risen against the protectorate in a unified national movement. The royal family has thrown its weight behind #gold_value independence#!, and our remaining authority in the kingdom is crumbling. We cannot sustain our position against the will of an entire nation."
ztr_decolonization.18.d_phase4: "#v India#! is ungovernable. The #v Raj#! faces simultaneous mass uprisings, military mutinies, and the complete breakdown of colonial administration across the subcontinent. The greatest imperial possession in history is slipping through our fingers, and nothing can stop it."
ztr_decolonization.19.d_phase4: "#v Korea#! seethes with barely contained fury. Underground resistance networks have paralyzed the colonial administration, and our security forces face attacks daily. The occupation has become an international scandal and a military quagmire from which there is no honorable exit."
ztr_decolonization.20.d_phase4: "#v Japan#! has the military and industrial power to enforce its demands for full #gold_value sovereignty#!, and the world knows it. Our extraterritorial privileges are being torn up before our eyes, and we lack the means or the will to resist. The era of Western dominance in #v Japan#! is finished."
ztr_decolonization.21.d_phase4: "#v China#!'s revolutionary nationalism has turned our concessions and treaty ports into besieged enclaves. Furious crowds surround the foreign quarters, and our gunboats can no longer intimidate a continent. The century of humiliation that gave us our position is being avenged."
ztr_decolonization.22.d_phase4: "#v Afghanistan#! has erupted into full tribal warfare against our influence. Every attempt to project power beyond the border meets ferocious resistance from a united and battle hardened population. The frontier has become a graveyard of imperial ambition."
ztr_decolonization.23.d_phase4: "#v Malaysia#! is convulsed by an insurgency that combines nationalist aspiration with ruthless guerrilla tactics. The jungle war consumes battalions and budgets while the political situation in the cities deteriorates. Our colonial enterprise in #v Malaya#! faces total collapse."
ztr_decolonization.24.d_phase4: "#v Nepal#! has decisively rejected our treaty framework and mobilized its army along the border. The mountain kingdom's fierce martial tradition makes military enforcement unthinkable. Our influence in the Himalayas has been broken by a small but fiercely proud nation."
ztr_decolonization.25.d_phase4: "#v Bhutan#! has sealed its borders and repudiated our treaty outright. The mountain passes that once gave us leverage are now fortified against us. This remote kingdom has chosen complete isolation over continued submission, and we have no means to change their mind."
ztr_decolonization.26.d_phase4: "#v Tibet#! has effectively expelled all foreign presence and sealed the highland plateau against outside interference. Armed resistance and impossible terrain make any attempt to restore our influence a logistical nightmare. The roof of the world is lost to us."
ztr_decolonization.27.d_phase4: "#v New Zealand#! has made clear that it will no longer accept a subordinate constitutional status within the empire. Popular sentiment demands full and unqualified #gold_value sovereignty#!. The Pacific Dominion that once proudly flew the imperial flag now charts its own independent course."
ztr_decolonization.28.d_phase4: "#v Iraq#! is in open revolt against our mandate and military presence. Uprising has engulfed the countryside, and the cost of suppression exceeds anything the treasury can bear. Our forces face a hostile population of millions, and every bomb only creates more enemies."
ztr_decolonization.29.d_phase4: "#v Syria#! has become ungovernable under mandate authority. Nationalist forces control entire cities, and our troops face armed resistance at every turn. The mandate has failed utterly, and prolonging our presence serves only to deepen the bloodshed."
ztr_decolonization.30.d_phase4: "#v Lebanon#!'s population has united in armed resistance against the mandate. Barricades fill the streets of Beirut, and the gendarmerie has effectively dissolved. Our administration exists in name only, and any attempt to reassert control would require a full military occupation."
ztr_decolonization.31.d_phase4: "#v Transjordan#!'s population has risen against our presence, and the emir himself demands our immediate departure. Armed bands attack our remaining outposts with impunity. The territory has been lost to us in every way that matters."
ztr_decolonization.32.d_phase4: "#v Palestine#! has descended into chaos beyond any hope of mandate resolution. #v Arab#! and #v Jewish#! armed groups wage open war while our forces are caught in the middle, bleeding from both sides. The mandate has become a catastrophe, and the only question is how to extricate ourselves."
ztr_decolonization.33.d_phase4: "#v Kurdistan#! is in full armed revolt against mandate authority. Peshmerga fighters control the mountain passes and the administration has collapsed outside the largest towns. We face an enemy that knows the terrain intimately and will never stop fighting for their homeland."
ztr_decolonization.34.d_phase4: "#v Kenya#! has erupted into widespread armed resistance that has overwhelmed the colonial security apparatus. Emergency measures and mass detentions have failed to suppress a movement rooted in profound grievance. The colony has become a moral and military catastrophe."
ztr_decolonization.35.d_phase4: "#v Namibia#!'s resistance movement has taken up arms, supported by international condemnation of our continued mandate. Guerrilla forces strike from the vast desert interior, and our garrison is stretched beyond endurance. The territory has become a costly and indefensible liability."
ztr_decolonization.36.d_phase4: "#v Somalia#! has erupted into armed revolt against the protectorate. Clan militias, now united under the banner of national liberation, attack our forces across the territory. The Horn of Africa has become a hostile and ungovernable frontier."
ztr_decolonization.37.d_phase4: "#v Eritrea#!'s liberation fighters wage a relentless guerrilla campaign that our forces cannot suppress. The territory's rugged terrain provides perfect cover for an enemy that grows stronger with each passing month. Continued occupation serves no purpose but to prolong suffering."
ztr_decolonization.38.d_phase4: "#v Chad#! has descended into armed rebellion across its vast and ungovernable territory. Colonial forces face attacks from the Saharan north to the tropical south, and supply lines are constantly cut. The cost of holding this enormous territory has become utterly prohibitive."
ztr_decolonization.39.d_phase4: "#v Niger#!'s resistance has turned violent, with armed groups striking at colonial installations and garrisons across the Sahel. The vast territory is impossible to police, and our forces are dangerously overstretched. Continued occupation invites only further bloodshed and humiliation."
ztr_decolonization.40.d_phase4: "#v Mauritania#!'s population has united in armed resistance against colonial rule. Desert fighters strike our outposts and vanish into the endless sands. The territory is a military nightmare, and our administration has ceased to function outside a handful of coastal towns."
ztr_decolonization.41.d_phase4: "#v Senegal#!, the heart of our West African empire, is in open revolt. Dakar's streets are barricaded, and the colonial federation's administrative center has become the epicenter of resistance. If #v Senegal#! falls, our entire West African position collapses with it."
ztr_decolonization.42.d_phase4: "#v Guinea#! has rejected colonial rule with a totality that leaves no room for negotiation. The entire territory has mobilized against us, and our administration has been expelled from the countryside. Attempting to hold #v Guinea#! by force would be an act of futile cruelty."
ztr_decolonization.43.d_phase4: "The #v Ivory Coast#! is ablaze with resistance. Plantation workers, urban laborers, and rural communities have joined in a total rejection of colonial rule. Our economic interests in the territory, once so profitable, now require a military occupation we cannot afford."
ztr_decolonization.44.d_phase4: "#v Ghana#!'s #gold_value independence#! movement has become unstoppable, with the entire territory united behind the demand for immediate #gold_value sovereignty#!. International opinion condemns our continued presence, and our own officials concede the cause is lost. The #v Gold Coast#! will be free, with or without our consent."
ztr_decolonization.45.d_phase4: "#v Togo#!'s resistance has overwhelmed the mandate administration. Armed groups and mass civil disobedience have made the territory ungovernable. International bodies demand our withdrawal, and we have neither the resources nor the justification to remain."
ztr_decolonization.46.d_phase4: "#v Benin#! has erupted into coordinated resistance that has paralyzed the colonial administration. Traditional rulers and modern nationalists have united in a formidable alliance against our continued presence. The colony has become indefensible."
ztr_decolonization.47.d_phase4: "Burkina Faso's population has risen in furious revolt against forced labor and colonial exploitation. Every road is dangerous, every garrison under threat. The territory that once silently supplied our coastal colonies with labor now demands freedom with a unified and desperate voice."
ztr_decolonization.48.d_phase4: "Nigeria, our most important African territory, teeters on the edge of violent upheaval. #gold_value Independence#! movements in every region have paralyzed the colonial government, and the security forces cannot maintain order. Losing Nigeria would signal the end of our African empire."
ztr_decolonization.49.d_phase4: "#v Cameroon#! has descended into armed struggle against the mandate authority. Liberation movements wage guerrilla war across the territory while international pressure demands our withdrawal. The mandate has become a byword for failed colonial governance."
ztr_decolonization.50.d_phase4: "The #v Central African Republic#! has risen in total revolt against colonial oppression. Armed resistance groups control the interior, and our garrison clings to a shrinking perimeter around the capital. The territory is lost in all but name."
ztr_decolonization.51.d_phase4: "#v Gabon#!'s #gold_value independence#! movement has turned militant, with sabotage of resource extraction facilities and armed attacks on colonial infrastructure. The territory's wealth, once our prize, fuels the very resistance that drives us out. Continued occupation serves no rational purpose."
ztr_decolonization.52.d_phase4: "The #v Republic of the Congo#! is in open insurrection. Brazzaville itself has become a battleground, and our administration has effectively collapsed. Armed movements control the countryside, and the colonial edifice crumbles before our eyes."
ztr_decolonization.53.d_phase4: "The #v Congo#! has exploded into a crisis of catastrophic proportions. The vast territory is engulfed in uprisings that our forces cannot possibly suppress. Decades of exploitation have created a fury that threatens to consume everything, and we face the prospect of the most violent decolonization in history."
ztr_decolonization.54.d_phase4: "#v Uganda#! has descended into armed revolt against the protectorate. The kingdoms and political movements have united in their determination to expel our administration by any means necessary. Our forces face an impossible task across a hostile territory of millions."
ztr_decolonization.55.d_phase4: "#v Rwanda#! is convulsed by violent upheaval as the struggle for #gold_value independence#! intersects with deep social tensions. The mandate administration has lost control of the countryside, and the security situation deteriorates daily. The territory is a powder keg that could detonate at any moment."
ztr_decolonization.56.d_phase4: "#v Tanzania#!'s #gold_value independence#! movement has achieved total popular mobilization. Our administration faces a united population of millions that will no longer tolerate foreign rule. Attempting to hold this territory against such overwhelming opposition would be an act of self destructive folly."
ztr_decolonization.57.d_phase4: "#v Angola#! has erupted into a brutal colonial war that stretches our armed forces to the absolute limit. Liberation movements wage simultaneous campaigns across the colony's vast territory. The war is unwinnable, and every day of continued fighting deepens the tragedy."
ztr_decolonization.58.d_phase4: "#v Zambia#!'s copper mines have shut down as workers join the general uprising against colonial rule. The economic foundation of our presence has been destroyed from within. Armed movements control the countryside, and our administration survives only inside fortified compounds."
ztr_decolonization.59.d_phase4: "#v Mozambique#! is engulfed in a liberation war that our forces cannot win. Guerrilla fighters operate with impunity across the northern provinces, and the conflict spreads southward daily. The colonial war is draining our resources, our morale, and our standing in the world."
ztr_decolonization.60.d_phase4: "#v Malawi#! has risen in total defiance of colonial authority. Mass civil disobedience and sporadic violence have rendered the protectorate ungovernable. Our officials report that continuing to administer the territory is simply no longer possible."
ztr_decolonization.61.d_phase4: "#v Eswatini#!'s monarchy and people have declared our protectorate null and void. Armed youth groups patrol the borders, and our representatives have been expelled from the interior. The small kingdom has chosen confrontation over continued subjugation."
ztr_decolonization.62.d_phase4: "#v Lesotho#! has mobilized its entire population against continued protectorate status. The mountain passes are barricaded, and our administration has been driven from every district. The enclave kingdom has made our position utterly untenable."
ztr_decolonization.63.d_phase4: "#v Mali#! has erupted into armed resistance across its vast territory. From Timbuktu to Bamako, liberation forces challenge our authority with growing ferocity. The colonial administration has lost control of the interior, and retreat is the only viable option."
ztr_decolonization.64.d_phase4: "#v Botswana#!'s population has risen against the protectorate with a determination that belies the territory's small size. Coordinated resistance has made governance impossible, and international opinion demands our withdrawal. The #v Bechuanaland Protectorate#! is finished."
ztr_decolonization.65.d_phase4: "#v Zimbabwe#! is engulfed in a liberation war that grows more intense with each passing month. Guerrilla forces operate across the country, and the settler regime faces a military reality it cannot overcome. The colony stands at the edge of a revolutionary transformation."
ztr_decolonization.66.d_phase4: "#v Madagascar#! is in full revolt. The island's population has united in armed resistance against colonial rule, and our forces face an enemy that outnumbers them overwhelmingly. The great island has become an inescapable trap for our colonial ambitions."
ztr_decolonization.67.d_phase4: "#v Ethiopia#! wages total war against our presence with the fury of an ancient and proud civilization. The #v Ethiopian#! army, hardened by years of resistance, strikes our positions with devastating effectiveness. We face a humiliating defeat at the hands of a nation that will never submit."
 # Option C - Grant Autonomy as Colony
ztr_decolonization.c: "Grant Autonomy as Colony"
 # Option E - Let Them Fight for It
ztr_decolonization.e: "Let Them Fight for It"


ztr_decolonization.1.t: "Winds of Decolonization" #UPDATE
ztr_decolonization.1.d: "Amid growing international pressure, the rise of nationalism and rigid colonial policies, our [concept_subject] [SCOPE.sCountry('subject_scope').GetName] is demanding #gold_value Independence#!. The global tide is shifting, and we must decide whether to adapt to the new order or risk conflict to preserve our [Concept('concept_decolonization','Colonial')] empire." #UPDATE
ztr_decolonization.1.a: "Grant them what they want, even #gold_value Independence#!. We have to adapt to the new world." #UPDATE
ztr_decolonization.1.b: "We must preserve our empire, even in case of a possible conflict." #UPDATE

#NEW 1.6

ztr_decolonization_age.2.t:0 "The Age of Decolonization"
ztr_decolonization_age.2.d:0 "The old colonial order, long assumed to be the natural state of the world, is beginning to show deep fractures.\n\n#v Self-determination#! movements are gathering strength in subject territories. Colonial administrators report growing unrest, and the costs of maintaining overseas empires, both moral and material, are mounting with each passing year.\n\nThe question is no longer whether the colonial age will end, but how swiftly and at what cost."
ztr_decolonization_age.2.f:0 "#italic The era of foreign domination is drawing to a close. The colonized peoples of the world will wait no longer.#!"
ztr_decolonization_age.2.a:0 "The winds of change are upon us."

 ### Decolonization Phase Events ###

 # Phase 1: Quiet Phase (0-25 pressure)

 ztr_decolonization_phases.1.t:0 "The Educated Native"
 ztr_decolonization_phases.1.d:0 "A Western-educated intellectual from [scope:decolonizing_state.GetName] has published a treatise demanding self-governance, citing the very principles of liberty we claim to uphold. The work is circulating among the colonial elites, and the local administration awaits our instructions — engage with the ideas, or silence them before they spread further."
 ztr_decolonization_phases.1.a:0 "Engage with their arguments"
 ztr_decolonization_phases.1.b:0 "Suppress the publication"

 ztr_decolonization_phases.2.t:0 "Missionaries and Conscience"
 ztr_decolonization_phases.2.d:0 "Missionaries returning from [scope:missionary_subject.GetName] have published harrowing accounts of the conditions endured by the native population — disease, hunger, and neglect laid bare for our public to read. Churches and newspapers alike demand answers, and Parliament cannot ignore the growing outcry."
 ztr_decolonization_phases.2.a:0 "Commission an official inquiry"
 ztr_decolonization_phases.2.b:0 "Dismiss the reports as exaggeration"

 ztr_decolonization_phases.3.t:0 "Songs of the Homeland"
 ztr_decolonization_phases.3.d:0 "A cultural revival is stirring in [scope:songs_state.GetName]. Folk songs, traditional dances, and oral histories are being performed with renewed fervor — celebrations that carry an unmistakable undercurrent of defiance. What appears as mere nostalgia to the uninitiated is, to the colonial administration, the first language of resistance."
 ztr_decolonization_phases.3.a:0 "Allow cultural expression"
 ztr_decolonization_phases.3.b:0 "Ban subversive gatherings"

 ztr_decolonization_phases.4.t:0 "Whispers in the Bazaar"
 ztr_decolonization_phases.4.d:0 "Intelligence reports from [scope:whispers_subject.GetName] reveal that underground nationalist networks are quietly taking shape — clandestine meetings in marketplaces, coded messages in trade correspondence, and oaths of solidarity sworn in back rooms. The movement is still fragile, but its roots grow deeper with each passing month."
 ztr_decolonization_phases.4.a:0 "Open informal dialogue"
 ztr_decolonization_phases.4.b:0 "Increase surveillance operations"

 # Phase 2: Request Phase (25-50 pressure)

 ztr_decolonization_phases.5.t:0 "A Formal Petition"
 ztr_decolonization_phases.5.d:0 "A delegation of colonial elites from [scope:petition_subject.GetName] has presented a formal petition for self-governance, drafted in impeccable legal language and citing their loyalty during wartime, their economic contributions, and the democratic principles [ROOT.GetName] professes to champion. This is no rabble's demand — it is a measured argument that cannot simply be dismissed."
 ztr_decolonization_phases.5.a:0 "Promise gradual reforms"
 ztr_decolonization_phases.5.b:0 "Reject the petition outright"

 ztr_decolonization_phases.6.t:0 "Colonial Workers' Strike"
 ztr_decolonization_phases.6.d:0 "Workers in the mines, plantations, and railways of [scope:strike_state.GetName] have organized a coordinated strike. Production has ground to a halt. Their demands go beyond wages — they want political representation and an end to the colonial labor regime. The local garrison awaits orders."
 ztr_decolonization_phases.6.a:0 "Negotiate with the strikers"
 ztr_decolonization_phases.6.b:0 "Break the strike by force"

 ztr_decolonization_phases.7.t:0 "The International Stage"
 ztr_decolonization_phases.7.d:0 "A delegation from [scope:intl_subject.GetName] has addressed the United Nations General Assembly, presenting a damning account of colonial rule under [ROOT.GetName]. Delegates from across the world listen with sympathy, and the international press seizes upon the spectacle. Our reputation hangs in the balance."
 ztr_decolonization_phases.7.a:0 "Acknowledge their grievances publicly"
 ztr_decolonization_phases.7.b:0 "Denounce the delegation"

 ztr_decolonization_phases.8.t:0 "A Native Press"
 ztr_decolonization_phases.8.d:0 "A network of native-language newspapers has emerged in [scope:press_state.GetName], printed on cheap presses and distributed hand to hand through villages and urban quarters alike. Their editorials speak of nationhood, dignity, and independence — ideas now reaching a literate audience hungry for change."
 ztr_decolonization_phases.8.a:0 "Tolerate the native press"
 ztr_decolonization_phases.8.b:0 "Censor the publications"

 ### Decolonization Slavery Events ###

 ztr_decolonization_slavery.1.t:0 "The Overlord's Slaves"
 ztr_decolonization_slavery.1.d:0 "The United Nations slavery ban has forced us to confront an uncomfortable truth in [scope:overlord_slavery_state.GetName]: indigenous slavery practices, maintained by native overlords for generations, have persisted under our colonial administration. We tolerated them for stability's sake, but the world's eyes are upon us now. We must decide whether to enforce abolition universally or grant exemptions to local custom."
 ztr_decolonization_slavery.1.a:0 "Enforce the ban universally"
 ztr_decolonization_slavery.1.b:0 "Grant cultural exemptions"

 ztr_decolonization_slavery.2.t:0 "The Mass Liberation"
 ztr_decolonization_slavery.2.d:0 "Thousands of newly freed slaves are flooding the cities of [scope:liberation_state.GetName], seeking work, shelter, and a future that was denied to them for a lifetime. Colonial infrastructure buckles under the sudden influx — hospitals overflow, shanty towns sprawl at the city edges, and local officials plead for resources."
 ztr_decolonization_slavery.2.a:0 "Invest in resettlement programs"
 ztr_decolonization_slavery.2.b:0 "Leave them to their fate"

 ztr_decolonization_slavery.3.t:0 "The Slaveholder's Defiance"
 ztr_decolonization_slavery.3.d:0 "Powerful slaveholding elites in [scope:defiance_state.GetName] have refused to comply with the abolition decree, barricading their estates and threatening open rebellion. They command local wealth, labor networks, and the loyalty of armed retainers. Enforcing the law will require force; negotiation will require compromise."
 ztr_decolonization_slavery.3.a:0 "Send troops to enforce compliance"
 ztr_decolonization_slavery.3.b:0 "Negotiate a transition period"

 ztr_decolonization_slavery.4.t:0 "The Freedmen's Petition"
 ztr_decolonization_slavery.4.d:0 "Former slaves in [scope:freedmen_state.GetName], now free citizens in name, have petitioned the colonial government for land, schools, and the right to vote — testing whether our abolition was genuine reform or mere lip service to the international community. Their leaders are eloquent, their case is just, and the world is watching."
 ztr_decolonization_slavery.4.a:0 "Grant land and schooling"
 ztr_decolonization_slavery.4.b:0 "Offer only symbolic gestures"
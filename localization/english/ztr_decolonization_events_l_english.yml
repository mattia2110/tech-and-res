colony_pop.2.a: "A noteworthy development"

colony_pop.3.t: "Subject Population Growth"
colony_pop.3.d: "Reports from [SCOPE.sCountry('generic_boom_subject').GetName] indicate a sustained increase in population growth. The introduction of basic public health infrastructure has begun to take effect, reducing childhood mortality, extending life expectancy, and swelling the ranks of a young population that the colonial economy cannot absorb.\n\nWhile the growth is gradual, it signals a fundamental shift in the demographic balance of the region. The implications for colonial control are impossible to ignore."
colony_pop.3.a: "Acknowledged"

 ### Decolonization Slavery Events ###

ztr_decolonization_slavery.1.t: "The Overlord's Slaves"
ztr_decolonization_slavery.1.d: "The [Concept('concept_united_nations','$concept_united_nations$')] #v Slavery Ban#! has forced us to confront an uncomfortable truth in [SCOPE.sState('overlord_slavery_state').GetName]: indigenous slavery practices, maintained by native overlords for generations, have persisted under our colonial administration. We tolerated them for stability's sake as a quiet arrangement that kept local elites cooperative and the territory governable.\n\nBut the world's eyes are upon us now. Abolitionist societies demand action; the colonial lobby warns that enforcement will destabilize the region. We must decide whether to abolish universally or grant exemptions to local custom."
ztr_decolonization_slavery.1.a: "Enforce the ban universally, without exceptions"
ztr_decolonization_slavery.1.b: "Grant cultural exemptions to preserve stability"
ztr_decolonization_slavery_1_a_effect_tt: "[Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] gain #n radicals#!, and non-primary homeland cultures gain #v fervor#!."
ztr_decolonization_slavery_1_b_effect_tt: "[Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] gain #p loyalists#!."

ztr_decolonization_slavery.2.t: "The Mass Liberation"
ztr_decolonization_slavery.2.d: "An emancipation decree has been proclaimed in [SCOPE.sState('liberation_state').GetName], and thousands of newly freed slaves are flooding the cities seeking work, shelter, and a future denied to them for a lifetime. Families separated by auction are reunited in the streets; former bondsmen weep openly in the public squares.\n\nBut the euphoria masks a looming crisis. The freedmen possess nothing: no land, no savings, no legal standing. Colonial infrastructure buckles under the influx, and without a careful transition, liberation may deliver them from chains only to cast them into destitution."
ztr_decolonization_slavery.2.a: "Invest in resettlement programs for the freedmen"
ztr_decolonization_slavery.2.b: "They are free. That will have to be enough."
ztr_decolonization_slavery_2_a_effect_tt: "[Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] gain #p loyalists#!."
ztr_decolonization_slavery_2_b_effect_tt: "[Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] gain #n radicals#!."

ztr_decolonization_slavery.3.t: "The Slaveholder's Defiance"
ztr_decolonization_slavery.3.d: "The planter class of [SCOPE.sState('defiance_state').GetName] has drawn a line. Faced with the abolition decree, the slaveholders have organized armed resistance: militias patrol the plantation roads, and colonial magistrates sympathetic to the planters refuse to enforce the law.\n\nSome speak openly of secession. They command local wealth, labor networks, and the loyalty of armed retainers. The colonial garrison is outnumbered and unsure of its orders. Enforcing abolition will require reinforcements; negotiation will require compromise."
ztr_decolonization_slavery.3.a: "The law will be enforced at bayonet point."
ztr_decolonization_slavery.3.b: "Negotiate a transition period to avoid bloodshed."

ztr_decolonization_slavery.4.t: "The Freedmen's Petition"
ztr_decolonization_slavery.4.d: "A delegation of formerly enslaved people in [SCOPE.sState('freedmen_state').GetName] has presented a petition bearing thousands of marks and signatures. They ask for what was promised and never delivered: land of their own, schools for their children, and equal standing before the law.\n\nThe petition is dignified and restrained, but behind it stands a community that has learned, through bitter experience, that freedom on paper means nothing without the means to sustain it. Their leaders are eloquent, their case is just, and the world is watching."
ztr_decolonization_slavery.4.a: "Grant land and schooling, we owe them that much."
ztr_decolonization_slavery.4.b: "Offer only symbolic gestures: our coffers are not bottomless."
ztr_decolonization_slavery_4_a_effect_tt: "[Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] gain #p loyalists#!."
ztr_decolonization_slavery_4_b_effect_tt: "[Concept('ztr_concept_colonial_state','$ztr_concept_colonial_states$')] gain #n radicals#!."

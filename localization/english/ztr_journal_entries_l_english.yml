# NEW 1.6

fusion_reactor_decision: "Start Research for a Fusion Reactor"
fusion_reactor_decision_desc: "With the advent of advanced #blue_value Nuclear Physics#! and #blue_value Smart Energy Grids#!, our scientists believe that #gold_value Controlled Nuclear Fusion#!, the process that powers the stars themselves, may finally be within reach. A massive undertaking, the construction of a #gold_value Fusion Power Plant#! would revolutionize our nation's energy supply, but also destroy energy market. However, we must still stabilize this process and find a way to make it commercially viable."

fusion_reactor_purchase_decision:0 "Purchase Fusion Reactor Technology"
fusion_reactor_purchase_decision_desc:0 "While we lack the indigenous research infrastructure of the great powers, the world's first #gold_value Fusion Power Plant#! has already proved the viability of commercial fusion energy. By leveraging our technology partnerships and relations, we can negotiate the licensing and transfer of this technology. The cost will be enormous, but the rewards, virtually unlimited #P Clean Energy#!, are immeasurable."

je_fusion_reactor_research:0 "#gold_value Fusion Reactor#! Research"
je_fusion_reactor_research_reason:0 "Our top physicists and engineers are conducting an exhaustive research and experimentation on fusion energy, stabilizing #blue_value Plasma#! and achieving net energy gain. Progress depends on our nation's #v economy#!, #v scientific capacity#!, and #v population#!"
je_fusion_reactor_research_goal:0 "Complete the #gold_value Fusion Reactor#! Research"
je_fusion_reactor_construction:0 "Construct a #gold_value Fusion Power Plant#!"
je_fusion_reactor_construction_reason:0 "With the site for our #gold_value Fusion Power Plant#! identified, we can now proceed with the most ambitious construction project in our nation's history. This facility will harness the power of nuclear fusion, the same process that fuels the sun, to produce virtually limitless #P Clean Energy#!. Its completion will mark a new era in our nation's technological supremacy."

fusion_reactor.1.t:0 "A Stable #gold_value Fusion Reaction#! Achieved"
fusion_reactor.1.d:0 "After years of intensive research and painstaking experimentation, our scientists have successfully achieved a stable #Z Nuclear Fusion Reaction#!. This monumental breakthrough in plasma physics proves that the process powering the stars can be controlled on our country. Now it is possible to construct a #gold_value Civil Nuclear Fusion Reactor#! to supply our nation with virtually limitless and #P Clean Energy#!"
fusion_reactor.1.f:0 "We have tamed the atom. Now we shall harness the stars."
fusion_reactor.1.a:0 "Let us ignite the future."

fusion_reactor.2.t:0 "The #gold_value Fusion Power Plant#! Inaugurated"
fusion_reactor.2.d:0 "Our nation's #gold_value Fusion Power Plant#! has officially achieved first plasma. The reactor, a marvel of engineering that confines superheated hydrogen isotopes in powerful magnetic fields, promises to deliver virtually unlimited #P Clean Energy#!. This achievement places our nation at the absolute forefront of technological progress."
fusion_reactor.2.a:0 "The power of the stars is ours to command."

fusion_reactor.2.d_first:0 "In a ceremony attended by the world's foremost scientists, dignitaries, and engineers, our nation's #gold_value Fusion Power Plant#! has officially achieved first plasma. The reactor, a marvel of engineering that confines superheated hydrogen isotopes in powerful magnetic fields, promises to deliver virtually unlimited #P Clean Energy#!. This achievement makes our nation the leader in energy production."

fusion_reactor_global.t:0 "A New Era of Power"
fusion_reactor_global.d:0 "Reports are pouring in from across the globe as [SCOPE.sCountry('fusion_builder_country').GetName] has officially activated the world's very first commercial #gold_value Fusion Power Plant#!. This monumental achievement in harnessing the power of the stars represents a paradigm shift in human technological capability and energy production, ending the monopoly of fossil fuels."
fusion_reactor_global.a:0 "The #blue_value Future#! is here."

fusion_reactor_site: "Fusion Reactor Construction Site"
fusion_reactor_research: "Fusion Reactor Research"
fusion_reactor_purchase_cost: "Fusion Technology Licensing"
fusion_reactor_can_construct_tt: "Has identified and surveyed an appropriate site for a Fusion Reactor."
fusion_reactor_purchase_relations_tt: "We must have good relations with a fusion-owning greatpower to purchase fusion technology."
fusion_energy_pioneer: "Fusion Energy Pioneer"
fusion_energy_pioneer_tt: "Pioneering the era of fusion energy, our nation has achieved a stable #Z Nuclear Fusion Reaction#! and constructed the world's first commercial #gold_value Fusion Power Plant#!. This monumental achievement places our nation at the absolute forefront of technological progress and energy production, ending the monopoly of fossil fuels."

# IMF Modernization Journal Entry

je_imf_modernization:0 "IMF Modernization Objectives"
je_imf_modernization_reason:0 "The #blue_value International Monetary Fund#! has outlined the objectives that [ROOT.GetCountry.GetName] must meet to attain @developed_country! [Concept('concept_developed_country','$concept_developed_country$')] status.\n\nWe are expected to raise educational attainment, improve the material conditions of our population, and strengthen the economy until [ROOT.GetCountry.GetName] can stand among the @developed_country! [Concept('concept_developed_country','$concept_developed_countries$')]."
je_imf_modernization_goal:0 "Fulfill the IMF objectives for [ROOT.GetCountry.GetName]: improve [Concept('concept_literacy','$concept_literacy$')], raise average [Concept('concept_sol','$concept_sol$')], and attain @developed_country! [Concept('concept_developed_country','$concept_developed_country$')] status."
je_imf_modernization_literacy_tt:0 "Reach at least #v 70%#! [Concept('concept_literacy','$concept_literacy$')]."
je_imf_modernization_sol_tt:0 "Reach an average [Concept('concept_sol','$concept_sol$')] of at least #v 18#!."
 je_imf_modernization_developed_tt:0 "Have at least @money!#v 7#! of [Concept('concept_gdp_per_capita','$GDP per Capita$')]."
 je_imf_modernization_status_initial: "The #blue_value IMF#! review team has filed its first assessment. [ROOT.GetCountry.GetName] remains in the earliest phase of structural reform: [Concept('concept_literacy','$concept_literacy$')] is low, [Concept('concept_sol','$Standards of Living$')] are precarious, and the economy lacks the depth to sustain modern institutions. The road ahead is long."
 je_imf_modernization_status_early: "Initial reforms have begun to take root. Schools are opening in provincial towns, basic health infrastructure is expanding, and small-scale industrialization is creating the first pockets of wage labor. The #blue_value IMF#! notes #v Encouraging but fragile progress#! in [ROOT.GetCountry.GetName]."
 je_imf_modernization_status_progressing: "[ROOT.GetCountry.GetName] is now firmly on the path to modernization. The #blue_value IMF#! acknowledges #positive_value Substantial advances#! in [Concept('concept_literacy','$concept_literacy$')], a rising [Concept('concept_sol','$concept_sol$')], and a diversifying economic base. If this momentum continues, @developed_country! [Concept('concept_developed_country','$concept_developed_country$')] status is within realistic reach."
 je_imf_modernization_status_advanced: "[ROOT.GetCountry.GetName] is approaching the final thresholds. The #blue_value IMF#! classifies our progress as #positive_value Nearly complete#!: [Concept('concept_literacy','$concept_literacy$')] is high, living conditions have dramatically improved, and the economy is generating enough wealth to sustain modern development. Fulfillment of the objectives is close at hand."
 ztr_imf_request_technical_mission: "Request #blue_value IMF#! Technical Mission"
 ztr_imf_request_technical_mission_desc: "Formally request the #blue_value International Monetary Fund#! to dispatch a team of economic advisors, institutional experts, and education specialists to help guide [ROOT.GetCountry.GetName]'s modernization program. Their expertise will accelerate progress at a modest treasury cost."
 ztr_imf_technical_mission_cooldown_tt: "We have not recently hosted an #blue_value IMF#! Technical Mission (5-year cooldown)."
 ztr_imf_technical_mission_cost_tt: "The #blue_value Technical Mission#! will cost @money!#v 1%#! of our [Concept('concept_gdp','GDP')]."
 ztr_imf_launch_development_plan: "Launch #gold_value National Development Plan#!"
 ztr_imf_launch_development_plan_desc: "Draft and promulgate a comprehensive #gold_value National Development Plan#! outlining industrial priorities, infrastructure expansion, and institutional modernization over the next two decades. The plan will boost construction and productivity but may strain political stability."
 ztr_imf_seek_scholarships: "Seek #v Foreign Scholarships#!"
 ztr_imf_seek_scholarships_desc: "Negotiate scholarship programs with #v Great Powers#! that maintain good relations with [ROOT.GetCountry.GetName]. Sending promising students abroad will spread new knowledge and techniques back home."
 ztr_imf_scholarships_cooldown_tt: "We have not recently arranged foreign scholarship programs (3-year cooldown)."
 ztr_imf_scholarships_gp_relations_tt: "We must have at least #p Cordial#! relations with a #v Great Power#!."
 imf_modernization_commitment_modifier: "IMF Modernization Commitment"
 imf_modernization_commitment_modifier_desc: "The #blue_value IMF#! modernization framework provides a baseline of international technical support, modest innovation gains, and a degree of global recognition."
 imf_scholarship_fund_modifier: "University Scholarship Fund"
 imf_scholarship_fund_modifier_desc: "Government-funded university scholarships are keeping talented graduates in the country, expanding the domestic intellectual class."
 imf_emigration_restriction_modifier: "Brain Drain Controls"
 imf_emigration_restriction_modifier_desc: "Border restrictions and exit permits slow the hemorrhage of educated professionals, but stifle the intelligentsia and earn quiet resentment."
 imf_brain_drain_modifier: "Brain Drain"
 imf_brain_drain_modifier_desc: "The best and brightest continue to leave for wealthier nations. Educational capacity erodes as graduates seek better opportunities abroad."
 imf_austerity_accepted_modifier: "IMF Austerity Program"
 imf_austerity_accepted_modifier_desc: "Fiscal discipline imposed at the #blue_value IMF#!'s insistence is painful for the population but opens the door to international credit and institutional trust."
 imf_partial_austerity_modifier: "Negotiated Fiscal Terms"
 imf_partial_austerity_modifier_desc: "A pragmatic compromise with the #blue_value IMF#! preserves some welfare spending while implementing enough fiscal discipline to maintain international credibility."
 imf_foreign_investment_modifier: "Foreign Capital Boom"
 imf_foreign_investment_modifier_desc: "Waves of foreign capital are pouring into industry and infrastructure, rapidly expanding productive capacity."
 imf_joint_venture_modifier: "Joint Venture Framework"
 imf_joint_venture_modifier_desc: "Mandatory local partnership requirements ensure that foreign investment transfers knowledge and technology alongside capital."
 imf_nationalization_modifier: "Economic Nationalization"
 imf_nationalization_modifier_desc: "Seizing control of key industries from foreign investors has boosted national pride and empowered domestic industrialists, but at a cost to productive efficiency."
 imf_rural_schools_modifier: "Rural School Construction"
 imf_rural_schools_modifier_desc: "Hundreds of new schools are opening across the countryside, bringing basic and secondary education to remote communities for the first time."
 imf_media_literacy_modifier: "Mass Media Literacy Campaign"
 imf_media_literacy_modifier_desc: "Radio broadcasts, printed pamphlets, and traveling lecturers are slowly spreading basic literacy at minimal cost."
 imf_religious_education_modifier: "Religious Education Networks"
 imf_religious_education_modifier_desc: "Churches, mosques, and temples are serving as the backbone of rural education, extending the reach of learning while strengthening the #v Devout#! interest group."
 imf_political_repression_modifier: "Modernization by Decree"
 imf_political_repression_modifier_desc: "The government has chosen to silence domestic opposition to the modernization program through force, gaining stability at the expense of international reputation."
 imf_ig_repression_modifier: "Political Suppression"
 imf_ig_repression_modifier_desc: "State security apparatus is actively undermining this faction's ability to organize and influence policy."
 imf_political_cooperation_modifier: "Reform Coalition"
 imf_political_cooperation_modifier_desc: "Bringing opposition voices into the reform process slows progress but builds broader political legitimacy."
 imf_ig_cooperation_modifier: "Included in Reform Coalition"
 imf_ig_cooperation_modifier_desc: "This faction has been invited to participate in the modernization process and its concerns are being addressed."
 imf_public_consultation_modifier: "Public Modernization Dialogue"
 imf_public_consultation_modifier_desc: "Open public consultations on the direction of modernization have energized civic participation but diffused governmental authority."
 superpower_aid_modifier: "Superpower Aid"
 superpower_aid_modifier_desc: "Massive foreign aid flows are helping us modernize, but not without political strings attached."
imf_technical_mission_modifier: "IMF Technical Mission"
 imf_technical_mission_modifier_desc: "A team of #blue_value IMF#! advisors and international specialists is working alongside domestic institutions, accelerating educational reform and spreading modern administrative practices."
 imf_development_plan_modifier: "National Development Plan"
 imf_development_plan_modifier_desc: "A comprehensive long-term plan is channeling resources into priority infrastructure and industry, though the centralized effort strains political flexibility."
 imf_foreign_scholarships_modifier: "Foreign Scholarship Program"
 imf_foreign_scholarships_modifier_desc: "Promising scholars are studying abroad in #v Great Power#! universities, bringing back cutting-edge knowledge and establishing lasting academic networks."


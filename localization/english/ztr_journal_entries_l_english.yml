 # Decolonization JE
 je_decolonization:0 "Winds of Change"
 je_decolonization_reason:0 "The age of colonial empires is drawing to a close. Across the globe, subject peoples are demanding self-determination, international organizations are challenging the legitimacy of imperial rule, and the cost of maintaining overseas territories is mounting.\n\n[ROOT.GetCountry.GetName] must navigate this tidal shift carefully: resist and face growing insurgency and international condemnation, or guide the transition and preserve what influence it can.\n\n#v Decolonization Pressure#!: [ROOT.GetCountry.MakeScope.Var('ztr_decolonization_pressure_var').GetValue|0]/100"
 je_decolonization_goal:0 "All non-European [Concept('concept_subject','$concept_subjects$')] gain independence."
 je_decolonization_status_low:0 "Colonial governance remains broadly accepted internationally, though early signs of change are emerging."
 je_decolonization_status_rising:0 "Nationalist movements in the colonies are gaining momentum. International opinion is shifting against colonial rule."
 je_decolonization_status_high:0 "The tide of decolonization is now unmistakable. Multiple colonies are demanding independence and international pressure is mounting."
 je_decolonization_status_critical:0 "The colonial order is collapsing. Subject peoples across the empire are in open revolt or on the verge of it. Maintaining the empire has become politically and economically unsustainable."
 je_decolonization_complete_tt:0 "No remaining colonial subjects."
 ztr_decolonization_pressure_bar:0 "Decolonization Pressure"
 ztr_decolonization_pressure_bar_desc:0 "Decolonization Pressure: #v [ROOT.GetCountry.MakeScope.Var('ztr_decolonization_pressure_var').GetValue|0]/100#!\n\nMeasures the growing international and domestic momentum toward the dissolution of colonial empires. As pressure rises, subjects gain increasing liberty desire and decolonization events become more consequential."


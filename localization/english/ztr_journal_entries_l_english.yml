ztr_ask_a_government_liberal_petition_desc: "In order to gain the support of the #gold_value Liberal#! faction and avoid further divisions, we should consider to enact some reforms that address their concerns."
ztr_treaty_with_liberals: "Sign a Coop Treaty with #gold_value Liberals#!"
ztr_treaty_with_liberals_desc: "Thanks to our good relations with the #gold_value Liberal#! faction, we could find a middle ground and sign a treaty of cooperation that would help to stabilize the situation in [ROOT.GetCountry.GetName]."
ztr_help_liberal_consensus: "Stimulate #gold_value Liberals#! Consensus"
ztr_help_liberal_consensus_desc: "By promoting policies that align with the values of the #gold_value Liberal#! faction, we can fight the growing influence of the #negative_value Communists#! and maintain order in [ROOT.GetCountry.GetName]."
ztr_repress_soviet_movements: "Repress #negative_value Communists#! Movements"
ztr_repress_soviet_movements_desc: "The rise of #negative_value Communists#! movements in [ROOT.GetCountry.GetName] poses a significant threat to our stability. We must take decisive action to suppress these groups and maintain order."
ztr_je_russian_absolutism_government_petition: "Petition for Liberals Consensus"
ztr_je_russian_absolutism_government_petition_status: "The [SCOPE.gsInterestGroup('government_petition_ig').GetName] are petitioning for [SCOPE.sLaw('government_petition_law').GetName] to pass. If we want to obtain their support against #negative_value Communists#!, we must seriously consider their requests."
ztr_je_russian_absolutism_government_petition_reason: "The [SCOPE.gsInterestGroup('government_petition_ig').GetName] are petitioning for [SCOPE.sLaw('government_petition_law').GetName] to pass.\n\nIf [SCOPE.sLaw('government_petition_law').GetName] is successfully passed, the #gold_value Liberals#! will be greatly pleased and may offer their support in our efforts to maintain order and stability in [ROOT.GetCountry.GetName]."

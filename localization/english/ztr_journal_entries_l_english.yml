ztr_ottoman_collapse_complete_tt: "The Empire will collapse, losing control over its #v Peripheral Provinces#! and the empire will cease to exist."
je_group_global_historical_content: "Global Historical Content"
je_ottoman_empire_collapse: "Ottoman Empire Decline"
je_ottoman_empire_collapse_reason: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetName] is entering a long crisis of debt, provincial unrest, military intrigue, and great-power encroachment.\n\nThe [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] #v Government#! must either reform fast enough to survive or watch the empire narrow into a smaller successor state.\n\n#v Great Powers#! that join this situation can sponsor regional aid missions in [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] Egypt, Syria, and Iraq, steadying the provinces while also building a future diplomatic case for intervention if the empire still breaks apart."
je_ottoman_empire_collapse_goal: "The [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetName] needs to stabilize the state through reform, growth, and geopolitical recovery before the collapse meter fills."
je_ottoman_empire_collapse_status: "The Porte still holds together, but debt, provincial unrest, and foreign intrigue are steadily eating away at imperial cohesion."
je_ottoman_empire_collapse_status_arab: "Arab provincial notables are increasingly treating Ottoman authority as negotiable, temporary, or openly illegitimate."
je_ottoman_empire_collapse_status_army: "The army is becoming a political arena of cliques, purges, and unpaid loyalties rather than a dependable instrument of the state."
je_ottoman_empire_collapse_status_foreign: "European financiers, concessionaires, and diplomats are openly mapping [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] provinces into rival spheres of influence."
je_ottoman_empire_collapse_status_terminal: "The empire is entering a terminal phase: every concession invites another demand, and every attempt at force now threatens to shatter the whole state."
ztr_ottoman_collapse_request_egypt: "Offer #v Aid In Egypt#!"
ztr_ottoman_collapse_request_egypt_desc: "Sponsor irrigation, policing, and agrarian support in [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] Egypt. If the empire later collapses, our Egyptian mission will ripen into formal claims."
ztr_ottoman_collapse_request_egypt_cost_tt: "If the [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] government accepts, this Egyptian aid mission will cost us #n @money! 1.5M#! of Treasury. #n If they refuse, they will no longer accept our offers#!."
ztr_ottoman_collapse_request_levant: "Offer #v Aid In Syria#!"
ztr_ottoman_collapse_request_levant_desc: "Back provincial relief, transport works, and anti-unrest measures in Syria, Lebanon, Palestine, and Transjordan. If the empire later collapses, our Syrian mission will justify claims."
ztr_ottoman_collapse_request_levant_cost_tt: "If the [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] government accepts, this Syrian aid mission will cost us #n @money! 1M#! of Treasury. #n If they refuse, they will no longer accept our offers#!."
ztr_ottoman_collapse_request_iraq: "Offer #v Aid In Iraq#!"
ztr_ottoman_collapse_request_iraq_desc: "Finance irrigation, communications, and administrative support in Baghdad, Basra, and Mosul. If the empire later collapses, our Iraqi mission will become a claim to those provinces."
ztr_ottoman_collapse_request_iraq_cost_tt: "If the [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] government accepts, this Iraqi aid mission will cost us #n @money! 1M#! of Treasury. #n If they refuse, they will no longer accept our offers#!."
ztr_ottoman_egypt_foreign_aid_modifier: "Egyptian Aid Mission"
ztr_ottoman_egypt_foreign_aid_modifier_desc: "Foreign engineers, agrarian credit, and new policing support are helping stabilize Egypt and raise agricultural output."
ztr_ottoman_syria_foreign_aid_modifier: "Syrian Aid Mission"
ztr_ottoman_syria_foreign_aid_modifier_desc: "Outside-backed transport works, subsidies, and administrative support are easing unrest across the Syrian provinces."
ztr_ottoman_iraq_foreign_aid_modifier: "Iraqi Aid Mission"
ztr_ottoman_iraq_foreign_aid_modifier_desc: "Foreign-funded river works, infrastructure, and provincial support are helping stabilize [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] Iraq."
ztr_diplomatic_cooldown_tt: "We have recently made a diplomatic request. We have to wait a few years before making another."
ztr_ottoman_situation_not_dramatic_tt: "The [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] situation is dramatic enough to warrant foreign intervention."
ztr_ottoman_already_accepted_help_tt: "The [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] government has already accepted a foreign aid."
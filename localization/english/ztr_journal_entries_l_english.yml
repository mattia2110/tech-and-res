ztr_ccp_global_progress_bar_desc: "Chinese Communist Global Momentum: #v [GetGlobalVariable('ztr_ccp_overall_progress').GetValue|0]/100#!"
ztr_je_two_chinas_accord: "The Two Chinas Accord"
ztr_je_two_chinas_accord_reason: "With both #n Communist China#! and #blue_value Nationalist China#! now entrenched among the shattered Chinese warlords, the remaining Han and Manchu holdouts have become tempting prey.\n\nDespite their ideological hostility, the two rival Chinas can still strike temporary bargains, backing one another in coordinated diplomatic plays so long as enough neighboring warlords remain to divide between them."
ztr_je_two_chinas_accord_status: "Both rival Chinas can still cooperate long enough to partition the remaining neighboring warlords."


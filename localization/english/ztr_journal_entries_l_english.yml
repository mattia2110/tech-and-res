je_group_chinese_civil_war: "The Chinese Communist Front"
ztr_je_chinese_communist_front: "The Chinese Communist Front"
ztr_je_chinese_communist_front_reason: "The collapse of #v Qing#! authority has left a fragmented Han world vulnerable to new ideologies, such as @equality_index! #N Communism#!.\n\nEach #v Warlord#! now develops its own local revolutionary momentum, but the wider danger is tracked through a single shared measure of red pressure across #gold_value China#!.\n\nIf #v Warlords#! don't unite, with #v Diplomacy#! or #v Steel#!, they can fall one by one to the @equality_index! #N Communism#!.\n\nIf the situation doesn't degenerate, a #blue_value Nationalist#! #v Movement#! can rise and be supported to counter the #N Red Threat#!."
ztr_je_chinese_communist_front_status: "#N Communist#! agitation remains scattered, local, and politically incomplete."
ztr_je_chinese_communist_front_status_united: "#N Communist#! organizers are linking workers, officers, and peasants into a broader united-front network across #v China#!."
ztr_je_prc_created: "The #v People's Republic of China#! has been established."
ztr_je_chinese_communist_front_status_armed: "#N Communist#! now has enough aggregate strength to sustain armed bases and rival state-building."
ztr_ccp_global_progress_bar: "Chinese Communist Global Momentum"
ztr_ccp_global_progress_bar_desc: "Chinese Communist Global Momentum: #v [GetGlobalVariable('ztr_ccp_overall_progress').GetValue|0]/100#!"
ztr_je_two_chinas_accord: "The Two Chinas Accord"
ztr_je_two_chinas_accord_reason: "With both #n Communist China#! and #blue_value Nationalist China#! now entrenched among the shattered Chinese warlords, the remaining Han and Manchu holdouts have become tempting prey.\n\nDespite their ideological hostility, the two rival Chinas can still strike temporary bargains, backing one another in coordinated diplomatic plays so long as enough neighboring warlords remain to divide between them."
ztr_je_two_chinas_accord_status: "Both rival Chinas can still cooperate long enough to partition the remaining neighboring warlords."

#Ottoman JE Localization Completely Updated

ztr_ottoman_collapse_complete_tt: "The Empire will collapse, losing control over its #v Peripheral Provinces#! and the empire will cease to exist."
je_group_global_historical_content: "Global Historical Content"
je_ottoman_empire_collapse: "Ottoman Empire Decline"
je_ottoman_empire_collapse_reason: "[SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetName] is entering a long crisis of debt, provincial unrest, military intrigue, and great-power encroachment.\n\nThe [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] #v Government#! must either reform fast enough to survive or watch the empire narrow into a smaller successor state.\n\n#v Great Powers#! that join this situation can sponsor regional aid missions in [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] Egypt, Syria, and Iraq, steadying the provinces while also building a future diplomatic case for intervention if the empire still breaks apart."
je_ottoman_empire_collapse_goal: "The [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetName] needs to stabilize the state through reform, growth, and geopolitical recovery before the collapse meter fills."
je_ottoman_empire_collapse_status: "The Porte still holds together, but debt, provincial unrest, and foreign intrigue are steadily eating away at imperial cohesion."
je_ottoman_empire_collapse_status_arab: "Arab provincial notables are increasingly treating Ottoman authority as negotiable, temporary, or openly illegitimate."
je_ottoman_empire_collapse_status_army: "The army is becoming a political arena of cliques, purges, and unpaid loyalties rather than a dependable instrument of the state."
je_ottoman_empire_collapse_status_foreign: "European financiers, concessionaires, and diplomats are openly mapping [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] provinces into rival spheres of influence."
je_ottoman_empire_collapse_status_terminal: "The empire is entering a terminal phase: every concession invites another demand, and every attempt at force now threatens to shatter the whole state."
ztr_ottoman_collapse_request_egypt: "Offer #v Aid In Egypt#!"
ztr_ottoman_collapse_request_egypt_desc: "Sponsor irrigation, policing, and agrarian support in [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] Egypt. If the empire later collapses, our Egyptian mission will ripen into formal claims."
ztr_ottoman_collapse_request_egypt_cost_tt: "If the [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] government accepts, this Egyptian aid mission will cost us #n @money! 1.5M#! of Treasury. #n If they refuse, they will no longer accept our offers#!."
ztr_ottoman_collapse_request_levant: "Offer #v Aid In Syria#!"
ztr_ottoman_collapse_request_levant_desc: "Back provincial relief, transport works, and anti-unrest measures in Syria, Lebanon, Palestine, and Transjordan. If the empire later collapses, our Syrian mission will justify claims."
ztr_ottoman_collapse_request_levant_cost_tt: "If the [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] government accepts, this Syrian aid mission will cost us #n @money! 1M#! of Treasury. #n If they refuse, they will no longer accept our offers#!."
ztr_ottoman_collapse_request_iraq: "Offer #v Aid In Iraq#!"
ztr_ottoman_collapse_request_iraq_desc: "Finance irrigation, communications, and administrative support in Baghdad, Basra, and Mosul. If the empire later collapses, our Iraqi mission will become a claim to those provinces."
ztr_ottoman_collapse_request_iraq_cost_tt: "If the [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] government accepts, this Iraqi aid mission will cost us #n @money! 1M#! of Treasury. #n If they refuse, they will no longer accept our offers#!."
ztr_ottoman_egypt_foreign_aid_modifier: "Egyptian Aid Mission"
ztr_ottoman_egypt_foreign_aid_modifier_desc: "Foreign engineers, agrarian credit, and new policing support are helping stabilize Egypt and raise agricultural output."
ztr_ottoman_syria_foreign_aid_modifier: "Syrian Aid Mission"
ztr_ottoman_syria_foreign_aid_modifier_desc: "Outside-backed transport works, subsidies, and administrative support are easing unrest across the Syrian provinces."
ztr_ottoman_iraq_foreign_aid_modifier: "Iraqi Aid Mission"
ztr_ottoman_iraq_foreign_aid_modifier_desc: "Foreign-funded river works, infrastructure, and provincial support are helping stabilize [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] Iraq."
ztr_diplomatic_cooldown_tt: "We have recently made a diplomatic request. We have to wait a few years before making another."
ztr_ottoman_situation_not_dramatic_tt: "The [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] situation is dramatic enough to warrant foreign intervention."
ztr_ottoman_already_accepted_help_tt: "The [SCOPE.sCountry('ztr_ottoman_collapse_target_country').GetAdjective] government has already accepted a foreign aid."

# Superpower Request Law Enactment
je_superpower_request_law_enactment:0 "Aid Alignment Requirements"
je_superpower_request_law_enactment_reason:0 "The aid package brokered by [SCOPE.sCountry('superpower_law_requester').GetName] is not purely humanitarian. Their diplomats expect [ROOT.GetCountry.GetName] to bring its institutions closer to the sponsor's model by enacting [SCOPE.sLaw('superpower_alignment_law').GetName] within #v 5 years#!.\n\nFailure will signal that we accepted foreign money without accepting the political alignment that came with it."
je_superpower_request_law_enactment_goal:0 "Within #v 5 years#!, enact [SCOPE.sLaw('superpower_alignment_law').GetName] to satisfy [SCOPE.sCountry('superpower_law_requester').GetName]'s conditions."
je_superpower_request_law_enactment_status_pending:0 "[SCOPE.sCountry('superpower_law_requester').GetName] is still waiting for us to enact [SCOPE.sLaw('superpower_alignment_law').GetName]. The aid keeps flowing, but their patience will not last forever."
je_superpower_request_law_enactment_status_enacting:0 "[ROOT.GetCountry.GetName] is now enacting [SCOPE.sLaw('superpower_alignment_law').GetName] in order to honor the political conditions attached to [SCOPE.sCountry('superpower_law_requester').GetName]'s aid."
je_superpower_request_law_enactment_completed_desc:0 "Passing [SCOPE.sLaw('superpower_alignment_law').GetName] satisfies [SCOPE.sCountry('superpower_law_requester').GetName]'s expectations and modestly improves relations."
je_superpower_request_law_enactment_timeout_desc:0 "If we fail to pass [SCOPE.sLaw('superpower_alignment_law').GetName] in time, relations with [SCOPE.sCountry('superpower_law_requester').GetName] will worsen and the aid modifier will be withdrawn early."
je_un_info_panel:0 "United Nations"
je_un_info_panel_reason:0 "The [Concept('concept_united_nations','$concept_united_nations$')] has become the main forum for international diplomacy, mediation, and legitimacy with the aim to prevent war in favor of diplomatic solutions and human rights.\n\nAs long as [ROOT.GetCountry.GetName] remains inside the organization, this panel tracks the current permanent members of the #blue_value Security Council#! and the leading powers shaping its agenda.\n\n#v CURRENT UN GOVERNANCE#!:\nVoting Model: #v [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_voting_model_name')]#!\nPMs Veto: #v [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_veto_right_name')]#!\nPMs Selection: #v [SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_law_member_selection_name')]#!\n\n#v CURRENT SECURITY COUNCIL PERMANENT MEMBERS#!:\n[SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_1_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_2_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_3_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_4_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_5_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_6_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_7_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_8_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_9_type')][SCOPE.GetRootScope.GetCountry.GetCustom('ztr_un_permanent_member_display_rank_10_type')]"
je_un_info_panel_status_member:0 "#blue_value Status#!: Member State"
je_un_info_panel_status_permanent:0 "#gold_value Status#!: Permanent Member of the Security Council"
je_un_votations:0 "UN Vote Session"
je_un_votations_reason:0 "The Security Council has opened a vote on a #v Governance Reform#! after a preliminary thirty-day discussion period.\n\n#bold Subject#!: #v [JournalEntry.GetCustom('ztr_un_vote_subject_name_je')]#!\n#bold Proposal#!: #p [JournalEntry.GetCustom('ztr_un_vote_proposal_name_je')]#!\n#bold Current Law#!: #n [JournalEntry.GetCustom('ztr_un_vote_current_law_name_je')]#!\n\nEvery eligible #blue_value UN Member#! can vote, and countries that do nothing remain neutral by default. If support votes exceed opposition when the session closes, the reform will be adopted."


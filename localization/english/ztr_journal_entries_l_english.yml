# NEW 1.6

fusion_reactor_decision: "Start Research for a Fusion Reactor"
fusion_reactor_decision_desc: "With the advent of advanced #blue_value Nuclear Physics#! and #blue_value Smart Energy Grids#!, our scientists believe that #gold_value Controlled Nuclear Fusion#!, the process that powers the stars themselves, may finally be within reach. A massive undertaking, the construction of a #gold_value Fusion Power Plant#! would revolutionize our nation's energy supply, but also destroy energy market. However, we must still stabilize this process and find a way to make it commercially viable."

fusion_reactor_purchase_decision:0 "Purchase Fusion Reactor Technology"
fusion_reactor_purchase_decision_desc:0 "While we lack the indigenous research infrastructure of the great powers, the world's first #gold_value Fusion Power Plant#! has already proved the viability of commercial fusion energy. By leveraging our technology partnerships and relations, we can negotiate the licensing and transfer of this technology. The cost will be enormous, but the rewards, virtually unlimited #P Clean Energy#!, are immeasurable."

je_fusion_reactor_research:0 "#gold_value Fusion Reactor#! Research"
je_fusion_reactor_research_reason:0 "Our top physicists and engineers are conducting an exhaustive research and experimentation on fusion energy, stabilizing #blue_value Plasma#! and achieving net energy gain. Progress depends on our nation's #v economy#!, #v scientific capacity#!, and #v population#!"
je_fusion_reactor_research_goal:0 "Complete the #gold_value Fusion Reactor#! Research"
je_fusion_reactor_construction:0 "Construct a #gold_value Fusion Power Plant#!"
je_fusion_reactor_construction_reason:0 "With the site for our #gold_value Fusion Power Plant#! identified, we can now proceed with the most ambitious construction project in our nation's history. This facility will harness the power of nuclear fusion, the same process that fuels the sun, to produce virtually limitless #P Clean Energy#!. Its completion will mark a new era in our nation's technological supremacy."

fusion_reactor.1.t:0 "A Stable #gold_value Fusion Reaction#! Achieved"
fusion_reactor.1.d:0 "After years of intensive research and painstaking experimentation, our scientists have successfully achieved a stable #Z Nuclear Fusion Reaction#!. This monumental breakthrough in plasma physics proves that the process powering the stars can be controlled on our country. Now it is possible to construct a #gold_value Civil Nuclear Fusion Reactor#! to supply our nation with virtually limitless and #P Clean Energy#!"
fusion_reactor.1.f:0 "We have tamed the atom. Now we shall harness the stars."
fusion_reactor.1.a:0 "Let us ignite the future."

fusion_reactor.2.t:0 "The #gold_value Fusion Power Plant#! Inaugurated"
fusion_reactor.2.d:0 "Our nation's #gold_value Fusion Power Plant#! has officially achieved first plasma. The reactor, a marvel of engineering that confines superheated hydrogen isotopes in powerful magnetic fields, promises to deliver virtually unlimited #P Clean Energy#!. This achievement places our nation at the absolute forefront of technological progress."
fusion_reactor.2.a:0 "The power of the stars is ours to command."

fusion_reactor.2.d_first:0 "In a ceremony attended by the world's foremost scientists, dignitaries, and engineers, our nation's #gold_value Fusion Power Plant#! has officially achieved first plasma. The reactor, a marvel of engineering that confines superheated hydrogen isotopes in powerful magnetic fields, promises to deliver virtually unlimited #P Clean Energy#!. This achievement makes our nation the leader in energy production."

fusion_reactor_global.t:0 "A New Era of Power"
fusion_reactor_global.d:0 "Reports are pouring in from across the globe as [SCOPE.sCountry('fusion_builder_country').GetName] has officially activated the world's very first commercial #gold_value Fusion Power Plant#!. This monumental achievement in harnessing the power of the stars represents a paradigm shift in human technological capability and energy production, ending the monopoly of fossil fuels."
fusion_reactor_global.a:0 "The #blue_value Future#! is here."

